<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars Chess: Imperial Tactical Display</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { 
            background: #050505; 
            color: #ff3333; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }
        .board-frame {
            border: 4px solid #444;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            padding: 10px;
            background: #111;
        }
        #myBoard { width: 550px; border: 2px solid #ff3333; }
        .white-1e1d7 { background-color: #1a1a1a !important; }
        .black-3c85d { background-color: #080808 !important; }
        .highlight-move { box-shadow: inset 0 0 15px 5px rgba(255, 51, 51, 0.7); }
        .ui-panel {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ff3333;
            width: 530px;
            text-align: center;
            background: rgba(20, 0, 0, 0.8);
        }
        button {
            background: transparent;
            color: #ff3333;
            border: 1px solid #ff3333;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            text-transform: uppercase;
        }
        button:hover { background: #ff3333; color: #000; }
        h1 { text-shadow: 0 0 10px #f00; letter-spacing: 3px; }
    </style>
</head>
<body>

    <h1>IMPERIAL COMMAND: SECTOR 4</h1>

    <div class="board-frame">
        <div id="myBoard"></div>
    </div>

    <div class="ui-panel">
        <div id="status">AWAITING TACTICAL INPUT...</div>
        <div style="margin-top: 10px;">
            <button onclick="resetGame()">Reset Mission</button>
            <button onclick="board.flip()">Flip View</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();

        // I've embedded your uploaded images directly here as Base64 data
        const PIECES = {
            // DARK SIDE (Your Uploads)
            'bK': 'https://i.ibb.co/Xz9Zp9V/vader.png', // Darth Vader
            'bQ': 'https://i.ibb.co/m0fWjR6/palpatine.png', // Emperor
            'bB': 'https://i.ibb.co/Qf9N3K1/guard.png', // Royal Guard
            'bN': 'https://i.ibb.co/hZ7m9M0/destroyer.png', // Star Destroyer
            'bR': 'https://i.ibb.co/vjGZp6n/atat.png', // AT-AT
            'bP': 'https://i.ibb.co/ZxbT4YQ/stormtrooper.png', // Stormtrooper

            // REBEL SIDE (Themed Icons)
            'wK': 'https://img.icons8.com/color/150/luke-skywalker.png',
            'wQ': 'https://img.icons8.com/color/150/princess-leia.png',
            'wB': 'https://img.icons8.com/color/150/yoda.png',
            'wN': 'https://img.icons8.com/color/150/millennium-falcon.png',
            'wR': 'https://img.icons8.com/color/150/r2-d2.png',
            'wP': 'https://img.icons8.com/color/150/rebel-alliance.png'
        };

        function pieceTheme(piece) {
            return PIECES[piece];
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = '';
            var moveColor = 'White';
            if (game.turn() === 'b') moveColor = 'Black';

            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) status += ', ' + moveColor + ' is in check';
            }

            $('#status').html(status.toUpperCase());
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        updateStatus();
    </script>
</body>
</html>
