<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Interactive Chess</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            margin-top: 50px;
        }

        .container {
            display: flex;
            gap: 20px;
            background: #34495e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        #myBoard {
            width: 450px;
        }

        .info-panel {
            width: 250px;
            display: flex;
            flex-direction: column;
        }

        .status-box {
            background: #2c3e50;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 5px solid #27ae60;
        }

        #move-history {
            height: 250px;
            overflow-y: auto;
            background: #1a252f;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 5px;
        }

        button {
            margin-top: auto;
            padding: 10px;
            cursor: pointer;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #c0392b;
        }

        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Grandmaster JS</h1>

    <div class="container">
        <div id="myBoard"></div>

        <div class="info-panel">
            <div class="status-box">
                <strong>Status:</strong><br>
                <span id="status">White to move</span>
            </div>
            
            <div id="move-history">
                <strong>History:</strong><hr>
                <div id="pgn-out"></div>
            </div>

            <button id="resetBtn">New Game</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $pgn = $('#pgn-out');

        function onDragStart (source, piece, position, orientation) {
            // Cannot move if game over
            if (game.game_over()) return false;

            // Only allow moves for the side whose turn it is
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            // Logic for move validation
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Simplification: always promote to Queen
            });

            // If move is illegal, snap piece back
            if (move === null) return 'snapback';

            updateStatus();
        }

        // Update board position after the piece snaps into place
        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';

            // Checkmate?
            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            }
            // Draw?
            else if (game.in_draw()) {
                status = 'Game over, drawn position';
            }
            // Game still on
            else {
                status = moveColor + ' to move';
                if (game.in_check()) {
                    status += ', ' + moveColor + ' is in check!';
                }
            }

            $status.html(status);
            $pgn.html(game.pgn({ max_width: 5, newline_char: '<br>' }));
            
            // Scroll history to bottom
            var historyDiv = document.getElementById("move-history");
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };

        board = Chessboard('myBoard', config);

        // Reset Game Button
        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            updateStatus();
        });

        updateStatus();
    </script>
</body>
</html>
