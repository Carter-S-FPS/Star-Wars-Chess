<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Hero Command</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #05080a; color: #4ef0ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .board-area { border: 4px solid #4ef0ff; box-shadow: 0 0 25px rgba(78, 240, 255, 0.4); background: #000; padding: 5px; }
        #myBoard { width: 500px; }
        .white-1e1d7 { background-color: #1a2a3a !important; }
        .black-3c85d { background-color: #0a0a10 !important; }
        .highlight-move { box-shadow: inset 0 0 15px 5px rgba(78, 240, 255, 0.8); }
        .controls { margin-top: 20px; width: 500px; text-align: center; background: rgba(0, 20, 30, 0.8); border: 1px solid #4ef0ff; padding: 15px; }
        button { background: transparent; color: #4ef0ff; border: 1px solid #4ef0ff; padding: 8px 15px; cursor: pointer; font-family: inherit; margin: 0 5px; }
        button.active { background: #4ef0ff; color: #000; font-weight: bold; }
        button.reset { color: #ff4e4e; border-color: #ff4e4e; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>COMMAND CENTER</h1>

    <div class="board-area"><div id="myBoard"></div></div>

    <div class="controls">
        <div id="status">LINK ESTABLISHED</div>
        <div style="margin:15px 0;">
            <button id="btn2P" class="active">2 PLAYER</button>
            <button id="btnAI">VS EMPIRE AI</button>
        </div>
        <button class="reset" onclick="resetGame()">SYSTEM RESET</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var vsAI = false;

        // HERO MODELS (Base64 SVGs)
        const MODELS = {
            // REBELS (White) - Blue/Cyan
            'wK': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDJsMyA2aDZsLTUgNGwyIDcgLTYtNC02IDQgMi03LTUtNGg2eiIvPjwvc3ZnPg==", // Luke (Star)
            'wQ': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDFsMyA1IDYgMi00IDQgMSA2LTUtMy01IDMgMSA2LTQtNC02LTJ6Ii8+PC9zdmc+", // Leia (Crown)
            'wP': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iNCIvPjwvc3ZnPg==", // Soldier (Dot)
            
            // EMPIRE (Black) - Red
            'bK': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHBhdGggZD0iTTEyIDJsMTAgMTBMMTIgMjIgMiAxMnoiLz48L3N2Zz4=", // Vader (Diamond)
            'bQ': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHBhdGggZD0iTTUgMTNoMTR2MmgtMTR6TTUgOSBoMTR2MmgtMTR6Ii8+PC9zdmc+", // Palpatine (Lines)
            'bP': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHJlY3QgeD0iOCIgeT0iOCIgd2lkdGg9IjgiIGhlaWdodD0iOCIvPjwvc3ZnPg==" // Trooper (Square)
        };

        function pieceTheme(piece) {
            // Use specific hero model if defined, otherwise use generic side icon
            if (MODELS[piece]) return MODELS[piece];
            const rebelSide = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDhsLTQgNHg0IDQtNC00eiIvPjwvc3ZnPg==";
            const empireSide = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHBhdGggZD0iTTExIDEwaDJ2NGgtMnoiLz48L3N2Zz4=";
            return (piece.charAt(0) === 'w') ? rebelSide : empireSide;
        }

        function makeAiMove() {
            if (game.game_over()) return;
            var moves = game.moves();
            game.move(moves[Math.floor(Math.random() * moves.length)]);
            board.position(game.fen());
            updateStatus();
        }

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if (vsAI && piece.search(/^b/) !== -1) return false;
            if (!vsAI && ((game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1))) return false;

            var moves = game.moves({ square: source, verbose: true });
            if (moves.length === 0) return;
            $('#myBoard .square-' + source).addClass('highlight-move');
            moves.forEach(m => $('#myBoard .square-' + m.to).addClass('highlight-move'));
        }

        function onDrop (source, target) {
            $('#myBoard .square-55d63').removeClass('highlight-move');
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            if (vsAI && !game.game_over()) window.setTimeout(makeAiMove, 500);
        }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'EMPIRE' : 'REBELS';
            $('#status').text(game.in_checkmate() ? turn + " DEFEATED" : turn + " TO STRIKE");
        }

        function resetGame() {
            game.reset(); board.start(); updateStatus();
            $('#myBoard .square-55d63').removeClass('highlight-move');
        }

        $('#btn2P, #btnAI').on('click', function() {
            vsAI = (this.id === 'btnAI');
            $('#btn2P, #btnAI').removeClass('active');
            $(this).addClass('active');
            resetGame();
        });

        board = Chessboard('myBoard', { draggable: true, position: 'start', pieceTheme: pieceTheme, onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: () => board.position(game.fen()) });
        updateStatus();
    </script>
</body>
</html>
