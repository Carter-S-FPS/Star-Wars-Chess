<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Space Chess</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #00eeff; text-shadow: 0 0 10px #00eeff; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>DEATH STAR TACTICAL VIEW</h1>
        <div id="status">SYSTEMS ONLINE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, pieces = [];

        function init() {
            scene = new THREE.Scene();
            // Dark Space Background
            scene.background = new THREE.Color(0x020205);
            
            // Add Stars
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<2000; i++) {
                starCoords.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.1});
            scene.add(new THREE.Points(starGeo, starMat));

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(12, 12, 12);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 10, 7);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            createBoard();
            setupPieces();
            animate();
        }

        function createBlock(group, x, y, z, color) {
            const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x * 0.2, y * 0.2, z * 0.2);
            group.add(mesh);
        }

        function buildPiece(type, side, gridX, gridZ) {
            const group = new THREE.Group();
            const mainColor = (side === 'black') ? 0x222222 : 0xcccccc;
            const accentColor = (side === 'black') ? 0xff0000 : 0x00aaff;

            if (type === 'P') { // TIE Fighter / X-Wing Voxel style
                for(let y=1; y<3; y++) createBlock(group, 0, y, 0, mainColor);
                createBlock(group, 1, 2, 0, accentColor);
                createBlock(group, -1, 2, 0, accentColor);
            } else if (type === 'R') { // AT-AT / Heavy Block
                for(let x=-1; x<=1; x++) for(let z=-1; z<=1; z++) createBlock(group, x, 0, z, mainColor);
                for(let y=1; y<4; y++) createBlock(group, 0, y, 0, mainColor);
            } else if (type === 'K') { // Leader
                for(let y=0; y<5; y++) createBlock(group, 0, y, 0, mainColor);
                createBlock(group, 0, 5, 0, accentColor);
            } else { // Generic Voxel
                for(let y=0; y<3; y++) createBlock(group, 0, y, 0, mainColor);
            }

            group.position.set(gridX - 3.5, 0, gridZ - 3.5);
            scene.add(group);
            pieces.push(group);
        }

        function createBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const geo = new THREE.BoxGeometry(1, 0.2, 1);
                    const mat = new THREE.MeshLambertMaterial({
                        color: isBlack ? 0x111111 : 0x333333,
                        emissive: isBlack ? 0x000000 : 0x001122
                    });
                    const square = new THREE.Mesh(geo, mat);
                    square.position.set(x - 3.5, -0.2, z - 3.5);
                    scene.add(square);
                }
            }
        }

        function setupPieces() {
            const layout = ['R','N','B','Q','K','B','N','R'];
            for(let i=0; i<8; i++) {
                buildPiece('P', 'black', i, 1);
                buildPiece(layout[i], 'black', i, 0);
                buildPiece('P', 'white', i, 6);
                buildPiece(layout[i], 'white', i, 7);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            pieces.forEach((p, i) => {
                p.position.y = Math.sin(time + i) * 0.05; // Hovering in space
            });
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
