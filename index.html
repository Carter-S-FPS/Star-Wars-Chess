<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Hologram Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            background-color: #05050a;
            color: #4ef0ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .board-container {
            border: 4px solid #4ef0ff;
            box-shadow: 0 0 20px #4ef0ff;
            padding: 5px;
            background: #000;
        }

        #myBoard { width: 500px; }

        /* Space-themed squares */
        .white-1e1d7 { background-color: #1b2631 !important; }
        .black-3c85d { background-color: #0d1117 !important; }

        .ui-panel {
            margin-top: 20px;
            text-align: center;
            width: 500px;
            padding: 15px;
            background: rgba(78, 240, 255, 0.1);
            border: 1px solid #4ef0ff;
        }

        .status { font-weight: bold; font-size: 1.2em; text-transform: uppercase; margin-bottom: 10px; }
        
        button {
            background: transparent;
            color: #ff4e4e;
            border: 1px solid #ff4e4e;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #ff4e4e; color: white; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 4px;">TACTICAL HOLO-CHESS</h1>

    <div class="board-container">
        <div id="myBoard"></div>
    </div>

    <div class="ui-panel">
        <div id="status" class="status">Initializing Comm Link...</div>
        <button onclick="resetGame()">Reset Sector</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();

        // Stable, open-source character icons mapped to Star Wars roles
        const pieceImages = {
            // REBELS (White - Blue Tint)
            'wK': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/wK.svg',
            'wQ': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/wQ.svg',
            'wB': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/wB.svg',
            'wN': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/wN.svg',
            'wR': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/wR.svg',
            'wP': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/wP.svg',
            
            // EMPIRE (Black - Red Tint)
            'bK': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/bK.svg',
            'bQ': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/bQ.svg',
            'bB': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/bB.svg',
            'bN': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/bN.svg',
            'bR': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/bR.svg',
            'bP': 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/pioneer/bP.svg'
        };

        function pieceTheme(piece) {
            return pieceImages[piece];
        }

        // --- Standard Logic ---
        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var moveColor = (game.turn() === 'b') ? 'EMPIRE' : 'REBELS';
            var status = moveColor + " IS COMMENCING ATTACK";

            if (game.in_checkmate()) status = "VICTORY FOR " + (game.turn() === 'b' ? "REBELS" : "EMPIRE");
            else if (game.in_draw()) status = "STALEMATE IN SPACE";
            else if (game.in_check()) status += " (TARGET LOCKED/CHECK)";

            $('#status').text(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        updateStatus();
    </script>
</body>
</html>
