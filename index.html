<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Galactic Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            background-color: #05070a;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                              radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            color: #4ef0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            margin: 0;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #4ef0ff;
            margin-bottom: 10px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
            border: 2px solid #4ef0ff;
            box-shadow: 0 0 20px rgba(78, 240, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
        }

        /* Custom Board Colors */
        .white-1e1d7 { background-color: #2c3e50 !important; }
        .black-3c85d { background-color: #1a252f !important; }

        #myBoard { width: 500px; border: 5px solid #333; }

        .side-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
        }

        .console {
            border: 1px solid #4ef0ff;
            padding: 15px;
            background: #000;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .status-light {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ef0ff;
            box-shadow: 0 0 8px #4ef0ff;
            margin-right: 10px;
        }

        #history {
            height: 200px;
            overflow-y: auto;
            font-size: 0.9em;
            color: #ffe81f; /* Star Wars Yellow */
            margin-top: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        button {
            background: transparent;
            color: #ff4e4e;
            border: 1px solid #ff4e4e;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #ff4e4e;
            color: black;
            box-shadow: 0 0 15px #ff4e4e;
        }
    </style>
</head>
<body>

    <h1>Galactic Chess</h1>

    <div class="game-container">
        <div id="myBoard"></div>

        <div class="side-panel">
            <div class="console">
                <div><span class="status-light"></span><strong>COMM LINK:</strong></div>
                <div id="status" style="margin-top:10px;">Awaiting first move...</div>
                <div id="history"></div>
            </div>
            <button onclick="resetGame()">INITIATE SELF-DESTRUCT (RESET)</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();

        // Theme piece mapping using icons/placeholders 
        // In a production app, you'd use local .png files for Vader, Luke, etc.
        function pieceTheme (piece) {
            // Mapping pieces to a consistent Star Wars themed set
            // w=Rebels, b=Empire
            if (piece.search(/w/) !== -1) {
                return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
            }
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'THE EMPIRE' : 'THE REBELS';

            if (game.in_checkmate()) {
                status = 'TERMINATED: ' + moveColor + ' has fallen.';
            } else if (game.in_draw()) {
                status = 'STALEMATE in the sector.';
            } else {
                status = moveColor + ' to strike...';
                if (game.in_check()) {
                    status += ' (DANGER: TARGET IN SIGHT)';
                }
            }

            $('#status').html(status);
            $('#history').html('<strong>LOG:</strong><br>' + game.pgn({ max_width: 5, newline_char: '<br>' }));
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            // pieceTheme: pieceTheme // Uncomment this to use custom piece URLs
        };
        board = Chessboard('myBoard', config);
        updateStatus();
    </script>
</body>
</html>
