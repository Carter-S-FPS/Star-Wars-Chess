<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Square Chess</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00eeff; pointer-events: none; z-index: 10; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; box-sizing: border-box; z-index: 10; }
        button { padding: 16px 5px; background: rgba(0, 15, 30, 0.9); color: #00eeff; border: 1px solid #00eeff; font-weight: bold; border-radius: 4px; pointer-events: auto; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status-text">SQUARE SELECTION MODE</div>
        <div id="sub-text">CLICK THE GRID TO MOVE</div>
    </div>

    <div class="controls">
        <button onclick="setMode('pvp')">Local Ops</button>
        <button onclick="setMode('ai')">Empire AI</button>
        <button onclick="resetGame()" style="grid-column: span 2; opacity: 0.6;">System Reset</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let scene, camera, renderer, controls, game;
        let selectedSquare = null;
        let isAiMode = false;
        let piecesGroup = new THREE.Group();
        let boardGroup = new THREE.Group(); // Separate group for squares
        let boardSquares = [];
        const S = 0.022; 

        function init() {
            game = new Chess();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010108);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 15, 5);
            scene.add(sun);

            createStars();
            createBoard();
            renderPieces();
            scene.add(boardGroup);
            scene.add(piecesGroup);
            
            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            animate();
        }

        function createComp(coords, color) {
            if (coords.length === 0) return new THREE.Group();
            const geo = new THREE.BoxBufferGeometry(S, S, S);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.InstancedMesh(geo, mat, coords.length);
            const d = new THREE.Object3D();
            coords.forEach((c, i) => {
                d.position.set(c[0] * S, c[1] * S, c[2] * S);
                d.updateMatrix();
                mesh.setMatrixAt(i, d.matrix);
            });
            return mesh;
        }

        function buildVoxelPiece(type, side, gridX, gridZ) {
            const group = new THREE.Group();
            const isEmp = (side === 'b');
            group.userData = { type, side, gridX, gridZ };
            let v = { main: [], head: [], legs: [], det: [], gold: [], blue: [] };

            if(isEmp) {
                switch(type) {
                    case 'r': // STAR DESTROYER
                        for(let z=-12; z<=10; z++) {
                            let w = Math.floor((10-z)/2);
                            for(let x=-w; x<=w; x++) v.main.push([x, 5, z]);
                        }
                        for(let x=-3; x<=3; x++) for(let y=6; y<9; y++) for(let z=-3; z<2; z++) v.det.push([x,y,z]);
                        group.add(createComp(v.main, 0x666666), createComp(v.det, 0x444444));
                        break;
                    case 'n': // AT-AT
                        for(let x=-4; x<=4; x++) for(let y=10; y<17; y++) for(let z=-7; z<=7; z++) v.main.push([x,y,z]);
                        [[-3,-6],[3,-6],[-3,6],[3,6]].forEach(p => { for(let y=0; y<10; y++) v.legs.push([p[0], y, p[1]]); });
                        for(let x=-3; x<=3; x++) for(let y=-2; y<2; y++) for(let z=0; z<5; z++) v.head.push([x,y,z]);
                        group.add(createComp(v.main, 0x666666), createComp(v.legs, 0x444444));
                        const h = createComp(v.head, 0x777777); h.position.set(0, 13.5 * S, 7 * S); h.name = "atat_head"; group.add(h);
                        break;
                    case 'b': // ROYAL GUARD
                        for(let y=0; y<18; y++) for(let x=-4; x<=4; x++) for(let z=-4; z<=4; z++) v.main.push([x,y,z]);
                        for(let y=18; y<25; y++) for(let x=-3; x<=3; x++) for(let z=-3; z<=3; z++) v.head.push([x,y,z]);
                        v.det.push([0, 20, 3.2], [0, 21, 3.2], [0, 22, 3.2]);
                        group.add(createComp(v.main, 0x990000), createComp(v.head, 0x770000), createComp(v.det, 0x000000));
                        break;
                    default:
                        for(let y=0; y<20; y++) for(let x=-5; x<=5; x++) for(let z=-5; z<=5; z++) v.main.push([x,y,z]);
                        group.add(createComp(v.main, 0x111111));
                }
            } else {
                group.rotation.y = Math.PI; 
                switch(type) {
                    case 'p': // CLONE TROOPER
                        for(let y=0; y<14; y++) for(let x=-3; x<=3; x++) for(let z=-3; z<=3; z++) v.main.push([x,y,z]);
                        for(let y=14; y<19; y++) for(let x=-4; x<=4; x++) for(let z=-4; z<=4; z++) v.head.push([x,y,z]);
                        v.det.push([0, 19, 0], [0, 20, 0], [1, 16.5, 4.1], [-1, 16.5, 4.1]); 
                        group.add(createComp(v.main, 0xffffff), createComp(v.head, 0xffffff), createComp(v.det, 0x000000));
                        break;
                    case 'n': // X-WING
                        for(let x=-2; x<=2; x++) for(let y=6; y<8; y++) for(let z=-14; z<=10; z++) v.main.push([x,y,z]);
                        const wz = -8;
                        for(let i=1; i<14; i++) {
                            let r = i*0.4; let s = 2+i;
                            v.head.push([s, 7+r, wz], [-s, 7+r, wz], [s, 7-r, wz], [-s, 7-r, wz]);
                            if(i === 13) for(let pz=-5; pz<4; pz++) v.det.push([s, 7+r, wz+pz], [-s, 7+r, wz+pz], [s, 7-r, wz+pz], [-s, 7-r, wz+pz]);
                        }
                        group.add(createComp(v.main, 0xeeeeee), createComp(v.head, 0xcccccc), createComp(v.det, 0xbb0000));
                        break;
                    case 'r': // DROID SPLIT
                        if (gridX < 4) { // R2
                            for(let y=0; y<10; y++) for(let x=-3; x<=3; x++) for(let z=-3; z<=3; z++) v.main.push([x, y, z]);
                            for(let x=-3; x<=3; x++) for(let z=-3; z<=3; z++) v.head.push([x, 10, z]);
                            v.blue.push([0, 11, 2.5], [1, 9, 3.1]); 
                            group.add(createComp(v.main, 0xffffff), createComp(v.head, 0x999999), createComp(v.blue, 0x0044ff));
                        } else { // 3PO
                            for(let y=0; y<14; y++) for(let x=-2; x<=2; x++) v.gold.push([x, y, 0]);
                            for(let y=14; y<20; y++) for(let x=-2; x<=2; x++) for(let z=-2; z<=2; z++) v.gold.push([x, y, z]);
                            v.det.push([1, 17, 2.1], [-1, 17, 2.1]);
                            group.add(createComp(v.gold, 0xc5a000), createComp(v.det, 0xffff00));
                        }
                        break;
                    default:
                        for(let y=0; y<20; y++) for(let x=-4; x<=4; x++) for(let z=-4; z<=4; z++) v.main.push([x,y,z]);
                        group.add(createComp(v.main, 0xeeeeee));
                }
            }
            group.position.set(gridX - 3.5, 0.1, gridZ - 3.5);
            piecesGroup.add(group);
        }

        function createStars() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<1000; i++) pos.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1})));
        }

        function createBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const sq = new THREE.Mesh(new THREE.BoxBufferGeometry(1, 0.2, 1), new THREE.MeshPhongMaterial({ color: isBlack ? 0x050505 : 0x151515 }));
                    sq.position.set(x - 3.5, -0.1, z - 3.5);
                    sq.userData = { x, z };
                    boardGroup.add(sq);
                    boardSquares.push(sq);
                }
            }
        }

        function renderPieces() {
            while(piecesGroup.children.length > 0) piecesGroup.remove(piecesGroup.children[0]);
            const state = game.board();
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(state[r][c]) buildVoxelPiece(state[r][c].type, state[r][c].color, c, r);
        }

        function onPointerDown(event) {
            if (event.target.tagName === 'BUTTON') return;
            const rect = renderer.domElement.getBoundingClientRect();
            const m = new THREE.Vector2();
            m.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            m.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            const ray = new THREE.Raycaster();
            ray.setFromCamera(m, camera);
            
            // Focus ONLY on the board squares
            const hits = ray.intersectObjects(boardSquares);
            
            if(hits.length > 0) {
                const boardHit = hits[0].object;
                const coord = String.fromCharCode(97 + boardHit.userData.x) + (8 - boardHit.userData.z);
                
                if(!selectedSquare) {
                    const p = game.get(coord);
                    if(p && p.color === game.turn()) {
                        selectedSquare = coord;
                        boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                        boardHit.material.emissive.setHex(0x004488);
                    }
                } else {
                    const move = game.move({ from: selectedSquare, to: coord, promotion: 'q' });
                    selectedSquare = null;
                    boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                    if(move) { renderPieces(); updateUI(); if(isAiMode) setTimeout(() => { const moves = game.moves(); if(moves.length > 0) { game.move(moves[Math.floor(Math.random()*moves.length)]); renderPieces(); updateUI(); } }, 500); }
                }
            }
        }

        function updateUI() { let t = game.turn() === 'w' ? "REBEL" : "EMPIRE"; document.getElementById('status-text').innerText = game.game_over() ? "WAR OVER" : t + " TURN"; }
        function setMode(m) { isAiMode = (m === 'ai'); resetGame(); }
        function resetGame() { game.reset(); renderPieces(); updateUI(); selectedSquare = null; }
        function animate() { requestAnimationFrame(animate); controls.update(); const time = Date.now() * 0.002; piecesGroup.children.forEach((piece, i) => { piece.position.y = 0.1 + Math.sin(time + i) * 0.02; const h = piece.getObjectByName("atat_head"); if(h) h.rotation.y = Math.sin(time * 0.5 + i) * 0.4; }); renderer.render(scene, camera); }
        window.onload = init;
    </script>
</body>
</html>
