<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corrected X-Wing Voxel Chess</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00eeff; pointer-events: none; z-index: 10; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; box-sizing: border-box; z-index: 10; }
        button { padding: 16px 5px; background: rgba(0, 15, 30, 0.9); color: #00eeff; border: 1px solid #00eeff; font-weight: bold; border-radius: 4px; pointer-events: auto; text-transform: uppercase; }
        #status-text { font-size: 1.4em; text-shadow: 0 0 10px #00eeff; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status-text">REAR ASSEMBLY CALIBRATED</div>
        <div id="sub-text">LONG-NOSE FUSELAGE DEPLOYED</div>
    </div>

    <div class="controls">
        <button onclick="setMode('pvp')">Local Ops</button>
        <button onclick="setMode('ai')">Imperial AI</button>
        <button onclick="resetGame()" style="grid-column: span 2; opacity: 0.6;">System Reboot</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let scene, camera, renderer, controls, game;
        let selectedSquare = null;
        let isAiMode = false;
        let piecesGroup = new THREE.Group();
        let boardSquares = [];
        const S = 0.045; 

        function init() {
            game = new Chess();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010105);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 14, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 15, 5);
            scene.add(light);
            createStars();
            createBoard();
            renderPieces();
            scene.add(piecesGroup);
            window.addEventListener('pointerdown', onPointerDown);
            animate();
        }

        function createStars() {
            const coords = [];
            for(let i=0; i<800; i++) coords.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15})));
        }

        function createBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const sq = new THREE.Mesh(
                        new THREE.BoxGeometry(0.98, 0.1, 0.98),
                        new THREE.MeshPhongMaterial({ color: isBlack ? 0x050505 : 0x101010 })
                    );
                    sq.position.set(x - 3.5, -0.05, z - 3.5);
                    sq.userData = { x, z };
                    scene.add(sq);
                    boardSquares.push(sq);
                }
            }
        }

        function v(group, x, y, z, color) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(S, S, S), new THREE.MeshLambertMaterial({color}));
            b.position.set(x * S, y * S, z * S);
            group.add(b);
        }

        function buildVoxelPiece(type, side, gridX, gridZ) {
            const group = new THREE.Group();
            const isEmp = (side === 'b');
            const grey = 0x333333;
            const vaderGrey = 0x1a1a1a;
            const white = 0xeeeeee;
            const saber = isEmp ? 0xff0000 : 0x00ffaa;
            const dir = isEmp ? 1 : -1;

            if(isEmp) {
                switch(type) {
                    case 'k': // VADER
                        for(let y=0; y<14; y++) {
                            for(let x=-4; x<=4; x++) for(let z=-3; z<0; z++) v(group, x, y, z, 0x080808); 
                            for(let x=-2.5; x<=2.5; x++) for(let z=0; z<=2.5; z++) v(group, x, y, z, vaderGrey); 
                        }
                        for(let x=-3.5; x<=3.5; x++) for(let z=-3.5; z<=3.5; z++) for(let y=14; y<19; y++) v(group, x, y, z, vaderGrey); 
                        for(let y=7; y<22; y++) v(group, 5.5, y, 3, saber); 
                        break;
                    case 'p': // TROOPER
                        for(let y=0; y<10; y++) for(let x=-2.5; x<=2.5; x++) for(let z=-2; z<=2; z++) v(group, x, y, z, white); 
                        for(let x=-3.5; x<=3.5; x++) for(let z=-3.5; z<=3.5; z++) for(let y=10; y<15; y++) v(group, x, y, z, white); 
                        for(let x=-2; x<=2; x++) v(group, x, 11, 3.6, 0x000000); 
                        break;
                    case 'n': // STAR DESTROYER
                        for(let z=-10; z<=8; z++) {
                            let w = Math.floor((8 - z) / 2.5);
                            for(let x=-w; x<=w; x++) { v(group, x, 2, z*dir, grey); v(group, x, 3, z*dir, grey); }
                        }
                        for(let x=-3; x<=3; x++) for(let z=-9; z<=-6; z++) for(let y=4; y<7; y++) v(group, x, y, z*dir, grey);
                        break;
                    default: for(let y=0; y<15; y++) v(group, 0, y, 0, grey); break;
                }
            } else {
                switch(type) {
                    case 'n': // X-WING (TRUE REAR WINGS)
                        // Fuselage: Constant thickness, but long nose
                        for(let x=-1.5; x<=1.5; x++) {
                            for(let y=3.5; y<=4.5; y++) {
                                for(let z=-14; z<=8; z++) v(group, x, y, z*dir, white); 
                            }
                        }
                        
                        // Shift assembly to the absolute REAR (-10 to -14 area)
                        const wingZ = -10; 
                        
                        // Engines: Beefy and back-heavy
                        const engineX = 2.5;
                        [[-engineX, 4.3], [engineX, 4.3], [-engineX, 3.7], [engineX, 3.7]].forEach(pos => {
                            for(let x=pos[0]-1; x<=pos[0]+1; x++) 
                                for(let y=pos[1]-1; y<=pos[1]+1; y++)
                                    for(let z=wingZ-3; z<=wingZ+1; z++) v(group, x, y, z*dir, 0x444444);
                        });

                        // Wings: Sharp angles starting from the very back of the fuselage
                        for(let i=1; i<12; i++) {
                            let angle = i * 1.2; 
                            // Wing panels with thickness
                            const zOffsets = [0, -1, -2];
                            zOffsets.forEach(zo => {
                                v(group, 1.5+i, 4+angle, (wingZ+zo)*dir, white); // Top Right
                                v(group, -1.5-i, 4+angle, (wingZ+zo)*dir, white); // Top Left
                                v(group, 1.5+i, 4-angle, (wingZ+zo)*dir, white); // Bottom Right
                                v(group, -1.5-i, 4-angle, (wingZ+zo)*dir, white); // Bottom Left
                            });
                        }
                        break;
                    case 'k': // JEDI
                        for(let y=0; y<15; y++) for(let x=-3; x<=3; x++) for(let z=-3; z<=3; z++) v(group, x, y, z, 0x4a3728);
                        for(let y=8; y<24; y++) v(group, 5, y, 0, saber);
                        break;
                    case 'p': // REBEL
                        for(let y=0; y<10; y++) for(let x=-2.5; x<=2.5; x++) for(let z=-2; z<=2; z++) v(group, x, y, z, 0x335533);
                        for(let x=-3.5; x<=3.5; x++) for(let z=-3.5; z<=3.5; z++) for(let y=10; y<14; y++) v(group, x, y, z, 0xddccbb);
                        break;
                    default: for(let y=0; y<15; y++) v(group, 0, y, 0, white); break;
                }
            }
            group.position.set(gridX - 3.5, 0.1, gridZ - 3.5);
            piecesGroup.add(group);
        }

        function renderPieces() {
            while(piecesGroup.children.length > 0) piecesGroup.remove(piecesGroup.children[0]);
            const state = game.board();
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(state[r][c]) buildVoxelPiece(state[r][c].type, state[r][c].color, c, r);
        }

        function onPointerDown(event) {
            if (event.target.tagName === 'BUTTON') return;
            const ray = new THREE.Raycaster();
            const m = new THREE.Vector2((event.clientX/window.innerWidth)*2-1, -(event.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].object.userData.x !== undefined) {
                const coord = String.fromCharCode(97 + hits[0].object.userData.x) + (8 - hits[0].object.userData.z);
                if(!selectedSquare) {
                    const p = game.get(coord);
                    if(p && p.color === game.turn()) {
                        selectedSquare = coord;
                        boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                        hits[0].object.material.emissive.setHex(0x004488);
                    }
                } else {
                    const move = game.move({ from: selectedSquare, to: coord, promotion: 'q' });
                    selectedSquare = null;
                    boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                    if(move) {
                        renderPieces(); updateUI();
                        if(isAiMode && !game.game_over()) setTimeout(() => {
                            const moves = game.moves();
                            if(moves.length > 0) { game.move(moves[Math.floor(Math.random()*moves.length)]); renderPieces(); updateUI(); }
                        }, 500);
                    }
                }
            }
        }

        function updateUI() {
            let t = game.turn() === 'w' ? "REBEL" : "EMPIRE";
            document.getElementById('status-text').innerText = game.game_over() ? "MISSION OVER" : t + " TURN";
        }
        function setMode(m) { isAiMode = (m === 'ai'); resetGame(); }
        function resetGame() { game.reset(); renderPieces(); updateUI(); selectedSquare = null; }
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            piecesGroup.children.forEach((p, i) => { p.position.y = 0.1 + Math.sin(Date.now()*0.002+i)*0.03; });
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
