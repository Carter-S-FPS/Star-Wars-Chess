<!DOCTYPE html>
<html>
<head>
    <title>Star Wars 3D Chess</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; color: #4ef0ff; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>GALACTIC 3D CHESS</h1>
        <div id="status">INITIALIZING NEURAL LINK...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lights (Saber Glow Effect)
        const light = new THREE.PointLight(0x4ef0ff, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2)); // Soft white light

        // 3. Create the Board (3D Tiles)
        const boardGroup = new THREE.Group();
        for (let x = 0; x < 8; x++) {
            for (let z = 0; z < 8; z++) {
                const color = (x + z) % 2 === 0 ? 0x222222 : 0x444444;
                const geometry = new THREE.BoxGeometry(1, 0.2, 1);
                const material = new THREE.MeshStandardMaterial({ color: color });
                const tile = new THREE.Mesh(geometry, material);
                tile.position.set(x - 3.5, 0, z - 3.5);
                boardGroup.add(tile);
            }
        }
        scene.add(boardGroup);

        // 4. Load the "People" (3D Models)
        const loader = new GLTFLoader();

        // Helper to load models (Example: Vader as Black King)
        function loadPiece(name, x, z, side) {
            // Path would be like: './models/vader.glb'
            loader.load(`./models/${name}.glb`, (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.4, 0.4, 0.4);
                model.position.set(x - 3.5, 0.1, z - 3.5);
                scene.add(model);
            }, undefined, (error) => {
                // If model doesn't exist, we place a "Hologram" cylinder placeholder
                const placeholderGeom = new THREE.CylinderGeometry(0.3, 0.3, 0.8);
                const placeholderMat = new THREE.MeshStandardMaterial({ 
                    color: side === 'empire' ? 0xff0000 : 0x00ff00,
                    transparent: true,
                    opacity: 0.6
                });
                const mesh = new THREE.Mesh(placeholderGeom, placeholderMat);
                mesh.position.set(x - 3.5, 0.5, z - 3.5);
                scene.add(mesh);
                console.log(`Replace this placeholder with ${name}.glb`);
            });
        }

        // Initialize characters
        loadPiece('vader', 4, 7, 'empire'); // King
        loadPiece('luke', 4, 0, 'rebel');   // King

        camera.position.set(0, 8, 8);
        const controls = new OrbitControls(camera, renderer.domElement);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
