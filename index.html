<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: 2D Sprite Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            background-color: #020205;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px);
            background-size: 100px 100px;
            color: #ffe81f;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .board-frame {
            border: 10px solid #333;
            border-radius: 5px;
            box-shadow: 0 0 50px rgba(78, 240, 255, 0.3);
            background: #111;
            padding: 10px;
        }

        #myBoard { width: 600px; }

        /* Custom board colors (Dark Space Theme) */
        .white-1e1d7 { background-color: #2c3e50 !important; } /* Space Blue */
        .black-3c85d { background-color: #1a1a1a !important; } /* Deep Black */

        .info {
            margin-top: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 2px solid #4ef0ff;
            width: 580px;
        }

        #status { font-size: 1.5rem; color: #4ef0ff; text-transform: uppercase; }

        button {
            margin-top: 10px;
            padding: 10px 30px;
            background: #ff4e4e;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1 style="text-shadow: 2px 2px #ff4e4e;">GALACTIC SPRITE CHESS</h1>

    <div class="board-frame">
        <div id="myBoard"></div>
    </div>

    <div class="info">
        <div id="status">Loading Holoprojector...</div>
        <button onclick="resetBoard()">Reset Mission</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();

        // 2D SPRITE MODELS - Web-sourced images
        const sprites = {
            // REBELS (White)
            'wK': 'https://i.ibb.co/Lkh6P6M/luke.png',      // Luke
            'wQ': 'https://i.ibb.co/L6V2kHm/leia.png',      // Leia
            'wB': 'https://i.ibb.co/pPzB5Dq/yoda.png',      // Yoda
            'wN': 'https://i.ibb.co/hR0Z0wz/falcon.png',    // Falcon
            'wR': 'https://i.ibb.co/mS7Sshh/r2d2.png',      // R2D2
            'wP': 'https://i.ibb.co/0VpS30s/rebel.png',     // Rebel Soldier
            
            // EMPIRE (Black)
            'bK': 'https://i.ibb.co/Xxd9Zzf/vader.png',     // Vader
            'bQ': 'https://i.ibb.co/VvzK2m7/palpatine.png', // Emperor
            'bB': 'https://i.ibb.co/9Vv8F5V/tarkin.png',    // Tarkin
            'bN': 'https://i.ibb.co/7XkXz7z/boba.png',      // Boba Fett
            'bR': 'https://i.ibb.co/4P2X4Y8/atat.png',      // AT-AT
            'bP': 'https://i.ibb.co/zH7j7p4/trooper.png'   // Stormtrooper
        };

        function pieceTheme(piece) {
            if (sprites[piece]) return sprites[piece];
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Empire' : 'Rebels';

            if (game.in_checkmate()) {
                status = 'Game Over: ' + (game.turn() === 'b' ? 'Rebels' : 'Empire') + ' Win!';
            } else if (game.in_draw()) {
                status = 'Draw: Stalemate in the sector';
            } else {
                status = moveColor + ' to move...';
                if (game.in_check()) status += ' (ALERT: CHECK)';
            }
            $('#status').html(status);
        }

        function resetBoard() {
            game.reset();
            board.start();
            updateStatus();
        }

        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        board = Chessboard('myBoard', config);
        updateStatus();
    </script>
</body>
</html>
