<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Chess | Galactic Battle</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root {
            --rebel-blue: #4ef0ff;
            --empire-red: #ff4e4e;
            --space-black: #05070a;
        }

        body {
            background-color: var(--space-black);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 30px);
            background-size: 150px 150px, 350px 350px;
            color: var(--rebel-blue);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 10px 0;
            text-shadow: 0 0 15px var(--rebel-blue);
        }

        .board-wrapper {
            border: 4px solid #333;
            box-shadow: 0 0 40px rgba(78, 240, 255, 0.2);
            padding: 5px;
            background: #111;
            border-radius: 4px;
        }

        #myBoard {
            width: 550px;
            max-width: 90vw;
        }

        /* Board Square Themes */
        .white-1e1d7 { background-color: #2c3e50 !important; }
        .black-3c85d { background-color: #1a1a1a !important; }

        .dashboard {
            margin-top: 20px;
            width: 550px;
            max-width: 90vw;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--rebel-blue);
            padding: 15px;
            text-align: center;
        }

        #status {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            height: 30px;
        }

        button {
            background: transparent;
            color: var(--empire-red);
            border: 1px solid var(--empire-red);
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: var(--empire-red);
            color: white;
            box-shadow: 0 0 20px var(--empire-red);
        }
    </style>
</head>
<body>

    <h1>Chess Wars</h1>

    <div class="board-wrapper">
        <div id="myBoard"></div>
    </div>

    <div class="dashboard">
        <div id="status">Scanning for Lifeforms...</div>
        <button onclick="resetGame()">Abort Mission (Reset)</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        
        // RELIABLE IMAGE MAPPING
        // These are curated images that look like the actual people/models.
        const pieces = {
            // REBELS (White)
            'wK': 'https://img.icons8.com/color/150/luke-skywalker.png',
            'wQ': 'https://img.icons8.com/color/150/princess-leia.png',
            'wB': 'https://img.icons8.com/color/150/yoda.png',
            'wN': 'https://img.icons8.com/color/150/millennium-falcon.png',
            'wR': 'https://img.icons8.com/color/150/r2-d2.png',
            'wP': 'https://img.icons8.com/color/150/rebel-alliance.png',

            // EMPIRE (Black)
            'bK': 'https://img.icons8.com/color/150/darth-vader.png',
            'bQ': 'https://img.icons8.com/color/150/emperor-palpatine.png',
            'bB': 'https://img.icons8.com/color/150/bobafett.png',
            'bN': 'https://img.icons8.com/color/150/tie-fighter.png',
            'bR': 'https://img.icons8.com/color/150/death-star.png',
            'bP': 'https://img.icons8.com/color/150/stormtrooper.png'
        };

        function pieceTheme(piece) {
            return pieces[piece];
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = '';
            var turn = (game.turn() === 'b') ? 'The Empire' : 'The Rebels';

            if (game.in_checkmate()) {
                status = 'Victory for ' + (game.turn() === 'b' ? 'The Rebels' : 'The Empire');
            } else if (game.in_draw()) {
                status = 'The War is a Draw';
            } else {
                status = turn + ' are preparing their strike...';
                if (game.in_check()) {
                    status += ' (Target Locked!)';
                }
            }

            $('#status').text(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };

        board = Chessboard('myBoard', config);
        updateStatus();
    </script>
</body>
</html>
