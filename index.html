<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Galactic Models</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            background: #000;
            color: #ffe81f; /* Star Wars Yellow */
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Galactic UI Styling */
        .board-wrapper {
            position: relative;
            padding: 10px;
            background: linear-gradient(45deg, #1a1a1a, #000);
            border: 4px solid #4ef0ff;
            box-shadow: 0 0 30px rgba(78, 240, 255, 0.4);
            border-radius: 4px;
        }

        #myBoard { width: 550px; }

        /* Themed Squares */
        .white-1e1d7 { background-color: #34495e !important; }
        .black-3c85d { background-color: #2c3e50 !important; }

        .dashboard {
            margin-top: 20px;
            text-align: center;
            border-top: 2px solid #ff4e4e;
            padding: 20px;
            width: 550px;
        }

        .status-msg {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4ef0ff;
            margin-bottom: 10px;
        }

        .btn-reset {
            background: #ff4e4e;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }
    </style>
</head>
<body>

    <h1 style="font-size: 3rem; margin: 20px 0;">CHESS WARS</h1>

    <div class="board-wrapper">
        <div id="myBoard"></div>
    </div>

    <div class="dashboard">
        <div id="status" class="status-msg">Scanning Sector...</div>
        <button class="btn-reset" onclick="resetGame()">REBOOT SYSTEM</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();

        // MODEL MAPPING
        // Replace these placeholder URLs with your actual Star Wars character sprites
        const models = {
            'wK': 'https://cdn-icons-png.flaticon.com/512/1084/1084124.png', // Luke
            'wQ': 'https://cdn-icons-png.flaticon.com/512/1084/1084123.png', // Leia
            'wR': 'https://cdn-icons-png.flaticon.com/512/1084/1084119.png', // R2D2
            'wB': 'https://cdn-icons-png.flaticon.com/512/1084/1084121.png', // Yoda
            'wN': 'https://cdn-icons-png.flaticon.com/512/1084/1084122.png', // Falcon
            'wP': 'https://cdn-icons-png.flaticon.com/512/1084/1084114.png', // Rebel
            
            'bK': 'https://cdn-icons-png.flaticon.com/512/1084/1084128.png', // Vader
            'bQ': 'https://cdn-icons-png.flaticon.com/512/1084/1084129.png', // Palpatine
            'bR': 'https://cdn-icons-png.flaticon.com/512/1084/1084118.png', // Death Star/ATAT
            'bB': 'https://cdn-icons-png.flaticon.com/512/1084/1084127.png', // Guard
            'bN': 'https://cdn-icons-png.flaticon.com/512/1084/1084120.png', // Boba Fett
            'bP': 'https://cdn-icons-png.flaticon.com/512/1084/1084117.png'  // Trooper
        };

        function pieceTheme(piece) {
            return models[piece];
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            let status = '';
            let moveColor = (game.turn() === 'b') ? 'THE EMPIRE' : 'THE REBELS';

            if (game.in_checkmate()) {
                status = 'VICTORY FOR ' + (game.turn() === 'b' ? 'THE REBELS' : 'THE EMPIRE');
            } else if (game.in_draw()) {
                status = 'DRAW: NEUTRAL ZONE REACHED';
            } else {
                status = moveColor + ' IS CALCULATING...';
            }
            $('#status').text(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme, // This applies our custom "models"
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };

        board = Chessboard('myBoard', config);
        updateStatus();
    </script>
</body>
</html>
