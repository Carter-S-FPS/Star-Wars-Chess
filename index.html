<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Custom Voxel Chess</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00eeff; pointer-events: none; z-index: 10; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; box-sizing: border-box; z-index: 10; }
        button { padding: 18px 5px; background: rgba(0, 20, 40, 0.9); color: #00eeff; border: 2px solid #00eeff; font-weight: bold; font-size: 11px; border-radius: 4px; pointer-events: auto; }
        #status-text { font-size: 1.4em; text-shadow: 0 0 10px #00eeff; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status-text">MODELS LOADED</div>
        <div id="sub-text">CHOOSE YOUR SIDE</div>
    </div>

    <div class="controls">
        <button onclick="setMode('pvp')">2 PLAYER</button>
        <button onclick="setMode('ai')">VS AI</button>
        <button onclick="resetGame()" style="grid-column: span 2;">REBOOT SYSTEM</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let scene, camera, renderer, controls, game;
        let selectedSquare = null;
        let isAiMode = false;
        let piecesGroup = new THREE.Group();
        let boardSquares = [];

        function init() {
            game = new Chess();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 15, 5);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            createStars();
            createBoard();
            renderPieces();
            scene.add(piecesGroup);

            window.addEventListener('pointerdown', onPointerDown);
            animate();
        }

        function createStars() {
            const coords = [];
            for(let i=0; i<800; i++) coords.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1})));
        }

        function createBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const sq = new THREE.Mesh(
                        new THREE.BoxGeometry(0.98, 0.4, 0.98),
                        new THREE.MeshPhongMaterial({ color: isBlack ? 0x050505 : 0x151515 })
                    );
                    sq.position.set(x - 3.5, -0.2, z - 3.5);
                    sq.userData = { x, z };
                    scene.add(sq);
                    boardSquares.push(sq);
                }
            }
        }

        function addB(group, x, y, z, color) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.16, 0.16), new THREE.MeshLambertMaterial({color}));
            b.position.set(x * 0.16, y * 0.16, z * 0.16);
            group.add(b);
        }

        function buildVoxelPiece(type, side, gridX, gridZ) {
            const group = new THREE.Group();
            const isEmp = (side === 'b');
            const colorA = isEmp ? 0x222222 : 0xeeeeee; // Main body
            const colorB = isEmp ? 0xff0000 : 0x00ffcc; // Saber/Detail

            if(isEmp) { // --- IMPERIAL MODELS ---
                switch(type) {
                    case 'p': // Stormtrooper: Vertical block with white helmet top
                        for(let y=0; y<3; y++) addB(group, 0, y, 0, 0x111111);
                        addB(group, 0, 3, 0, 0xffffff);
                        break;
                    case 'k': // Vader: Tall, flared cape back, red saber
                        for(let y=0; y<5; y++) addB(group, 0, y, 0, 0x000000);
                        for(let y=0; y<4; y++) { addB(group, 1, y, 0, 0x000000); addB(group, -1, y, 0, 0x000000); }
                        for(let y=2; y<5; y++) addB(group, 0, y, 1.5, colorB);
                        break;
                    case 'n': // Star Destroyer: Triangle base, raised bridge
                        for(let z=-2; z<=1; z++) for(let x=-z; x<=z; x++) addB(group, x, 1, z, colorA);
                        addB(group, 0, 2, -1, colorA);
                        break;
                    case 'r': // AT-AT: Thick legs, long body
                        for(let x=-1; x<=1; x+=2) for(let z=-1; z<=1; z+=2) for(let y=0; y<3; y++) addB(group, x, y, z, colorA);
                        for(let z=-2; z<=2; z++) addB(group, 0, 3, z, colorA);
                        break;
                    default: // Officer/Royal Guard
                        for(let y=0; y<5; y++) addB(group, 0, y, 0, 0x990000);
                        break;
                }
            } else { // --- JEDI MODELS ---
                switch(type) {
                    case 'p': // Rebel: Tan base, green helmet
                        addB(group, 0, 0, 0, 0x554433);
                        addB(group, 0, 1, 0, 0x335533);
                        addB(group, 0, 2, 0, 0xddccbb);
                        break;
                    case 'k': // Jedi: Brown robes, green saber
                        for(let y=0; y<5; y++) addB(group, 0, y, 0, 0x4a3728);
                        for(let y=2; y<6; y++) addB(group, 1, y, 0, colorB);
                        break;
                    case 'n': // X-Wing: Nose cone and 4 engine blocks
                        for(let z=-2; z<=2; z++) addB(group, 0, 2, z, colorA);
                        addB(group, 1, 1, -1, colorA); addB(group, -1, 1, -1, colorA);
                        addB(group, 1, 3, -1, colorA); addB(group, -1, 3, -1, colorA);
                        break;
                    case 'r': // Falcon-ish / Turret: Wide base, side cockpit
                        for(let x=-2; x<=2; x++) for(let z=-2; z<=2; z++) if(Math.abs(x)+Math.abs(z)<4) addB(group, x, 1, z, colorA);
                        addB(group, 2, 2, 0, 0x999999);
                        break;
                    default: // Master/Temple Guard
                        for(let y=0; y<5; y++) addB(group, 0, y, 0, colorA);
                        break;
                }
            }
            group.position.set(gridX - 3.5, 0.2, gridZ - 3.5);
            piecesGroup.add(group);
        }

        function renderPieces() {
            while(piecesGroup.children.length > 0) piecesGroup.remove(piecesGroup.children[0]);
            const state = game.board();
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(state[r][c]) buildVoxelPiece(state[r][c].type, state[r][c].color, c, r);
        }

        function onPointerDown(event) {
            if (event.target.tagName === 'BUTTON') return;
            const ray = new THREE.Raycaster();
            const m = new THREE.Vector2((event.clientX/window.innerWidth)*2-1, -(event.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].object.userData.x !== undefined) {
                const coord = String.fromCharCode(97 + hits[0].object.userData.x) + (8 - hits[0].object.userData.z);
                if(!selectedSquare) {
                    const p = game.get(coord);
                    if(p && p.color === game.turn()) {
                        selectedSquare = coord;
                        boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                        hits[0].object.material.emissive.setHex(0x004488);
                    }
                } else {
                    const move = game.move({ from: selectedSquare, to: coord, promotion: 'q' });
                    selectedSquare = null;
                    boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                    if(move) {
                        renderPieces();
                        updateUI();
                        if(isAiMode && !game.game_over()) setTimeout(() => {
                            const moves = game.moves();
                            game.move(moves[Math.floor(Math.random()*moves.length)]);
                            renderPieces(); updateUI();
                        }, 500);
                    }
                }
            }
        }

        function updateUI() {
            let t = game.turn() === 'w' ? "JEDI" : "EMPIRE";
            document.getElementById('status-text').innerText = game.game_over() ? "MISSION OVER" : t + " TURN";
        }
        function setMode(m) { isAiMode = (m === 'ai'); resetGame(); }
        function resetGame() { game.reset(); renderPieces(); updateUI(); selectedSquare = null; }
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            piecesGroup.children.forEach((p, i) => { p.position.y = 0.2 + Math.sin(Date.now()*0.002+i)*0.04; });
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
