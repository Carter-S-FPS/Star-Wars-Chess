<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Tactical Command</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            background-color: #05080a;
            color: #4ef0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { text-shadow: 0 0 10px #4ef0ff; letter-spacing: 4px; }

        .board-area {
            border: 4px solid #4ef0ff;
            box-shadow: 0 0 25px rgba(78, 240, 255, 0.4);
            background: #000;
            padding: 5px;
        }

        #myBoard { width: 500px; }

        /* Space Themes */
        .white-1e1d7 { background-color: #1a2a3a !important; }
        .black-3c85d { background-color: #0a0a10 !important; }
        .highlight-move { box-shadow: inset 0 0 15px 5px rgba(78, 240, 255, 0.8); }

        .controls {
            margin-top: 20px;
            width: 500px;
            text-align: center;
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid #4ef0ff;
            padding: 15px;
        }

        .mode-buttons { margin: 15px 0; }
        
        button {
            background: transparent;
            color: #4ef0ff;
            border: 1px solid #4ef0ff;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            margin: 0 5px;
            transition: 0.3s;
        }

        button.active { background: #4ef0ff; color: #000; font-weight: bold; }
        button.reset { color: #ff4e4e; border-color: #ff4e4e; margin-top: 10px; }
        button.reset:hover { background: #ff4e4e; color: #fff; }

        #status { font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>GALACTIC CHESS</h1>

    <div class="board-area">
        <div id="myBoard"></div>
    </div>

    <div class="controls">
        <div id="status">Scanning Sector...</div>
        
        <div class="mode-buttons">
            <button id="btn2P" class="active">2 PLAYER (LOCAL)</button>
            <button id="btnAI">VS EMPIRE AI</button>
        </div>

        <button class="reset" onclick="resetGame()">RESET SYSTEM</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var vsAI = false;

        // Base64 SVGs - Guaranteed to load on GitHub Pages
        const REBEL_PIECE = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDJMMiA3djExbDEwIDUgMTAtNXYtMTFsLTEwLTV6bTAgMThsLTggLTR2LThsOC00IDggNHY4bDgtNHoiLz48L3N2Zz4=";
        const EMPIRE_PIECE = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiLz48cGF0aCBkPSJNMTIgMmwtMiA0aDRsLTIgNHY0bC00LTJoOHoiIGZpbGw9IiMwMDAiLz48L3N2Zz4=";

        function pieceTheme(piece) {
            return (piece.charAt(0) === 'w') ? REBEL_PIECE : EMPIRE_PIECE;
        }

        // AI "Empire" Logic
        function makeAiMove() {
            if (game.game_over()) return;
            var moves = game.moves();
            var randomIdx = Math.floor(Math.random() * moves.length);
            game.move(moves[randomIdx]);
            board.position(game.fen());
            updateStatus();
        }

        function removeHighlights() {
            $('#myBoard .square-55d63').removeClass('highlight-move');
        }

        function onDragStart (source, piece) {
            if (game.game_over()) return false;

            // If AI is on, player is always White (Rebels)
            if (vsAI && piece.search(/^b/) !== -1) return false;

            // Turn validation
            if (!vsAI && ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1))) return false;

            // Highlight legal moves
            var moves = game.moves({ square: source, verbose: true });
            if (moves.length === 0) return;
            $('#myBoard .square-' + source).addClass('highlight-move');
            moves.forEach(m => $('#myBoard .square-' + m.to).addClass('highlight-move'));
        }

        function onDrop (source, target) {
            removeHighlights();
            var move = game.move({ from: source, to: target, promotion: 'q' });
            
            if (move === null) return 'snapback';

            updateStatus();

            // Empire strikes back
            if (vsAI && !game.game_over()) {
                window.setTimeout(makeAiMove, 500);
            }
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'EMPIRE' : 'REBELS';
            var status = turn + " TO STRIKE";
            if (game.in_checkmate()) status = turn + " DEFEATED";
            $('#status').text(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
            removeHighlights();
        }

        // Mode Switching Logic
        $('#btn2P').on('click', function() {
            vsAI = false;
            $(this).addClass('active');
            $('#btnAI').removeClass('active');
            resetGame();
        });

        $('#btnAI').on('click', function() {
            vsAI = true;
            $(this).addClass('active');
            $('#btn2P').removeClass('active');
            resetGame();
        });

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        updateStatus();
    </script>
</body>
</html>
