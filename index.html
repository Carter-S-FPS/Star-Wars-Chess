<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Complete Hero Command</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #020406; color: #4ef0ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .board-area { border: 4px solid #4ef0ff; box-shadow: 0 0 25px rgba(78, 240, 255, 0.4); background: #000; padding: 5px; position: relative; }
        
        /* Hologram flicker effect */
        #myBoard { width: 500px; filter: drop-shadow(0 0 5px rgba(78, 240, 255, 0.5)); opacity: 0.9; }
        
        .white-1e1d7 { background-color: #1a2a3a !important; }
        .black-3c85d { background-color: #0a0a10 !important; }
        .highlight-move { box-shadow: inset 0 0 15px 5px rgba(78, 240, 255, 0.8) !important; }
        
        .controls { margin-top: 20px; width: 500px; text-align: center; background: rgba(0, 20, 30, 0.9); border: 1px solid #4ef0ff; padding: 15px; }
        button { background: transparent; color: #4ef0ff; border: 1px solid #4ef0ff; padding: 8px 15px; cursor: pointer; font-family: inherit; margin: 0 5px; text-transform: uppercase; }
        button.active { background: #4ef0ff; color: #000; font-weight: bold; box-shadow: 0 0 10px #4ef0ff; }
        button.reset { color: #ff4e4e; border-color: #ff4e4e; margin-top: 15px; width: 100%; }
        #status { font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; color: #ffe81f; }
    </style>
</head>
<body>

    <h1>STRATEGIC HOLO-MAP</h1>

    <div class="board-area"><div id="myBoard"></div></div>

    <div class="controls">
        <div id="status">INITIATING SENSORS...</div>
        <div style="margin:10px 0;">
            <button id="btn2P" class="active">2 Player Mode</button>
            <button id="btnAI">Solo vs AI</button>
        </div>
        <button class="reset" onclick="resetGame()">Emergency Reset</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var vsAI = false;

        // ALL UNIQUE MODELS (Base64 SVGs)
        const MODELS = {
            // REBELS (White - Blue)
            'wK': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDJsMyA2aDZsLTUgNGwyIDcgLTYtNC02IDQgMi03LTUtNGg2eiIvPjwvc3ZnPg==",
            'wQ': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDFsMyA1IDYgMi00IDQgMSA2LTUtMy01IDMgMSA2LTQtNC02LTJ6Ii8+PC9zdmc+",
            'wB': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDJsMTAgMTctMTAgMy0xMC0zIDEwLTE3eiIvPjwvc3ZnPg==",
            'wN': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTIxIDExbC0zLTJoLTVsLTMgMi04IDggMyAzIDgtOCAyLTNoNXYtM3oiLz48L3N2Zz4=",
            'wR': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTQgNGgydjJoNHYtMmgydjJoNHYtMmgydjE2aC0xNHYtMTZ6Ii8+PC9zdmc+",
            'wP': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iNSIvPjwvc3ZnPg==",
            
            // EMPIRE (Black - Red)
            'bK': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHBhdGggZD0iTTEyIDJsMTAgMTBMMTIgMjIgMiAxMnoiLz48L3N2Zz4=",
            'bQ': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHBhdGggZD0iTTUgMTNoMTR2MmgtMTR6TTUgOSBoMTR2MmgtMTR6TTUgMTdoMTR2MmgtMTR6Ii8+PC9zdmc+",
            'bB': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHBhdGggZD0iTTEyIDJsOSAxNXY0aC0xOHYtNGw5LTE1eiIvPjwvc3ZnPg==",
            'bN': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iOCIvPjxwYXRoIGQ9Ik0xMiA0djE2TTQgMTJoMTYiIHN0cm9rZT0iIzAwMCIgc3Ryb2tlLXdpZHRoPSIyIi8+PC9zdmc+",
            'bR': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHBhdGggZD0iTTIgMmgyMHYyMGgtMjB6Ii8+PC9zdmc+",
            'bP': "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PHJlY3QgeD0iOCIgeT0iOCIgd2lkdGg9IjgiIGhlaWdodD0iOCIvPjwvc3ZnPg=="
        };

        function pieceTheme(piece) { return MODELS[piece]; }

        function makeAiMove() {
            if (game.game_over()) return;
            var moves = game.moves();
            game.move(moves[Math.floor(Math.random() * moves.length)]);
            board.position(game.fen());
            updateStatus();
        }

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if (vsAI && piece.search(/^b/) !== -1) return false;
            if (!vsAI && ((game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1))) return false;

            var moves = game.moves({ square: source, verbose: true });
            if (moves.length === 0) return;
            $('#myBoard .square-' + source).addClass('highlight-move');
            moves.forEach(m => $('#myBoard .square-' + m.to).addClass('highlight-move'));
        }

        function onDrop (source, target) {
            $('#myBoard .square-55d63').removeClass('highlight-move');
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            if (vsAI && !game.game_over()) window.setTimeout(makeAiMove, 500);
        }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'EMPIRE' : 'REBELS';
            $('#status').text(game.in_checkmate() ? "GAME OVER: " + turn + " FALLEN" : turn + " TURN");
        }

        function resetGame() {
            game.reset(); board.start(); updateStatus();
            $('#myBoard .square-55d63').removeClass('highlight-move');
        }

        $('#btn2P, #btnAI').on('click', function() {
            vsAI = (this.id === 'btnAI');
            $('#btn2P, #btnAI').removeClass('active');
            $(this).addClass('active');
            resetGame();
        });

        board = Chessboard('myBoard', { draggable: true, position: 'start', pieceTheme: pieceTheme, onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: () => board.position(game.fen()) });
        updateStatus();
    </script>
</body>
</html>
