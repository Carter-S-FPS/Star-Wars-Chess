<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hi-Res Voxel Star Wars</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00eeff; pointer-events: none; z-index: 10; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; box-sizing: border-box; z-index: 10; }
        button { padding: 15px 5px; background: rgba(0, 20, 40, 0.9); color: #00eeff; border: 1px solid #00eeff; font-weight: bold; border-radius: 4px; pointer-events: auto; }
        #status-text { font-size: 1.4em; text-shadow: 0 0 10px #00eeff; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status-text">HI-RES VOXELS LOADED</div>
        <div id="sub-text">TAP TO DEPLOY UNITS</div>
    </div>

    <div class="controls">
        <button onclick="setMode('pvp')">2 PLAYER</button>
        <button onclick="setMode('ai')">VS AI</button>
        <button onclick="resetGame()" style="grid-column: span 2;">RESET GRID</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let scene, camera, renderer, controls, game;
        let selectedSquare = null;
        let isAiMode = false;
        let piecesGroup = new THREE.Group();
        let boardSquares = [];

        // PIXEL SCALE - This is the "scale down" factor
        const S = 0.08; 

        function init() {
            game = new Chess();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010103);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            createStars();
            createBoard();
            renderPieces();
            scene.add(piecesGroup);

            window.addEventListener('pointerdown', onPointerDown);
            animate();
        }

        function createStars() {
            const coords = [];
            for(let i=0; i<1000; i++) coords.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1})));
        }

        function createBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const sq = new THREE.Mesh(
                        new THREE.BoxGeometry(0.98, 0.2, 0.98),
                        new THREE.MeshPhongMaterial({ color: isBlack ? 0x050505 : 0x111111 })
                    );
                    sq.position.set(x - 3.5, -0.1, z - 3.5);
                    sq.userData = { x, z };
                    scene.add(sq);
                    boardSquares.push(sq);
                }
            }
        }

        function addPixel(group, x, y, z, color) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(S, S, S), new THREE.MeshLambertMaterial({color}));
            b.position.set(x * S, y * S, z * S);
            group.add(b);
        }

        function buildDetailedPiece(type, side, gridX, gridZ) {
            const group = new THREE.Group();
            const isEmp = (side === 'b');
            const mainC = isEmp ? 0x222222 : 0xdddddd;
            const glowC = isEmp ? 0xff0000 : 0x00ffcc;

            if(isEmp) {
                switch(type) {
                    case 'k': // VADER (High Detail Helmet & Cape)
                        for(let y=0; y<10; y++) {
                            for(let x=-2; x<=2; x++) addPixel(group, x, y, -1, 0x000000); // Cape
                            addPixel(group, 0, y, 0, 0x000000); // Body
                        }
                        // Helmet shape
                        for(let x=-1; x<=1; x++) for(let z=-1; z<=1; z++) addPixel(group, x, 10, z, 0x000000);
                        for(let y=5; y<12; y++) addPixel(group, 2, y, 0, glowC); // Saber
                        break;
                    case 'n': // STAR DESTROYER (Tiered Bridge)
                        for(let z=-4; z<=4; z++) for(let x=-Math.floor((z+4)/1.5); x<=Math.floor((z+4)/1.5); x++) addPixel(group, x, 2, z, 0x444444);
                        for(let y=3; y<5; y++) for(let x=-1; x<=1; x++) addPixel(group, x, y, -2, 0x444444); // Bridge
                        break;
                    case 'p': // TROOPER (Better Helmet)
                        for(let y=0; y<6; y++) addPixel(group, 0, y, 0, 0x111111);
                        for(let x=-1; x<=1; x++) for(let z=-1; z<=1; z++) addPixel(group, x, 6, z, 0xffffff);
                        break;
                    default: // AT-AT
                        for(let x=-2; x<=2; x+=4) for(let z=-2; z<=2; z+=4) for(let y=0; y<6; y++) addPixel(group, x, y, z, 0x555555);
                        for(let x=-2; x<=2; x++) for(let z=-4; z<=4; z++) addPixel(group, x, 6, z, 0x555555);
                        break;
                }
            } else {
                switch(type) {
                    case 'k': // JEDI (Detailed Robe/Saber)
                        for(let y=0; y<10; y++) for(let x=-1; x<=1; x++) for(let z=-1; z<=1; z++) addPixel(group, x, y, z, 0x4a3728);
                        for(let y=5; y<13; y++) addPixel(group, 2, y, 0, glowC); // Green Saber
                        break;
                    case 'n': // X-WING (Detailed Wings/Nose)
                        for(let z=-6; z<=4; z++) addPixel(group, 0, 3, z, 0xcccccc); // Nose
                        for(let i=-3; i<=3; i+=6) {
                            addPixel(group, i, 2, -2, 0xcccccc); addPixel(group, i, 4, -2, 0xcccccc); // Wings
                        }
                        break;
                    case 'p': // REBEL
                        for(let y=0; y<5; y++) addPixel(group, 0, y, 0, 0x335533);
                        for(let x=-1; x<=1; x++) addPixel(group, x, 5, 0, 0xddccbb);
                        break;
                    default: // FALCON
                        for(let x=-4; x<=4; x++) for(let z=-4; z<=4; z++) if(x*x + z*z < 16) addPixel(group, x, 2, z, 0xcccccc);
                        addPixel(group, 4, 3, 0, 0x999999);
                        break;
                }
            }

            group.position.set(gridX - 3.5, 0.1, gridZ - 3.5);
            piecesGroup.add(group);
        }

        // Logic functions remain standard for compatibility...
        function renderPieces() {
            while(piecesGroup.children.length > 0) piecesGroup.remove(piecesGroup.children[0]);
            const state = game.board();
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(state[r][c]) buildDetailedPiece(state[r][c].type, state[r][c].color, c, r);
        }

        function onPointerDown(event) {
            if (event.target.tagName === 'BUTTON') return;
            const ray = new THREE.Raycaster();
            const m = new THREE.Vector2((event.clientX/window.innerWidth)*2-1, -(event.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].object.userData.x !== undefined) {
                const coord = String.fromCharCode(97 + hits[0].object.userData.x) + (8 - hits[0].object.userData.z);
                if(!selectedSquare) {
                    const p = game.get(coord);
                    if(p && p.color === game.turn()) {
                        selectedSquare = coord;
                        boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                        hits[0].object.material.emissive.setHex(0x004488);
                    }
                } else {
                    const move = game.move({ from: selectedSquare, to: coord, promotion: 'q' });
                    selectedSquare = null;
                    boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                    if(move) {
                        renderPieces();
                        updateUI();
                        if(isAiMode && !game.game_over()) setTimeout(() => {
                            const moves = game.moves();
                            game.move(moves[Math.floor(Math.random()*moves.length)]);
                            renderPieces(); updateUI();
                        }, 500);
                    }
                }
            }
        }

        function updateUI() {
            document.getElementById('status-text').innerText = game.game_over() ? "OVER" : game.turn().toUpperCase() + " TURN";
        }
        function setMode(m) { isAiMode = (m === 'ai'); resetGame(); }
        function resetGame() { game.reset(); renderPieces(); updateUI(); selectedSquare = null; }
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            piecesGroup.children.forEach((p, i) => { p.position.y = 0.1 + Math.sin(Date.now()*0.002+i)*0.03; });
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
