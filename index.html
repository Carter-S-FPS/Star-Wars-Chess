<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>32x Voxel Star Wars Chess</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00eeff; pointer-events: none; z-index: 10; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; box-sizing: border-box; z-index: 10; }
        button { padding: 16px 5px; background: rgba(0, 20, 40, 0.9); color: #00eeff; border: 1px solid #00eeff; font-weight: bold; border-radius: 4px; pointer-events: auto; text-transform: uppercase; }
        #status-text { font-size: 1.4em; text-shadow: 0 0 10px #00eeff; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status-text">32x GRID CALIBRATED</div>
        <div id="sub-text">MOLDED MODELS | REAR-WING X-WINGS</div>
    </div>

    <div class="controls">
        <button onclick="setMode('pvp')">Local Ops</button>
        <button onclick="setMode('ai')">Empire AI</button>
        <button onclick="resetGame()" style="grid-column: span 2; opacity: 0.6;">Reboot Simulation</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let scene, camera, renderer, controls, game;
        let selectedSquare = null;
        let isAiMode = false;
        let piecesGroup = new THREE.Group();
        let boardSquares = [];
        const S = 0.022; // Voxel scale for 32x grid

        function init() {
            game = new Chess();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010105);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 20, 5);
            scene.add(light);

            createStars();
            createBoard();
            renderPieces();
            scene.add(piecesGroup);
            window.addEventListener('pointerdown', onPointerDown);
            animate();
        }

        function v(group, x, y, z, color) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(S, S, S), new THREE.MeshLambertMaterial({color}));
            b.position.set(x * S, y * S, z * S);
            group.add(b);
        }

        function buildVoxelPiece(type, side, gridX, gridZ) {
            const piece = new THREE.Group();
            const isEmp = (side === 'b');
            const white = 0xeeeeee;
            const vaderDark = 0x111111;
            const saber = isEmp ? 0xff0000 : 0x00ffaa;
            const dir = isEmp ? 1 : -1;

            if(isEmp) {
                switch(type) {
                    case 'k': // VADER (MOLDED LAYERS)
                        for(let y=0; y<18; y++) {
                            for(let x=-5; x<=5; x++) for(let z=-8; z<0; z++) v(piece, x, y, z, 0x080808); 
                            for(let x=-4; x<=4; x++) for(let z=0; z<=4; z++) v(piece, x, y, z, vaderDark); 
                        }
                        // Helmet Flare (Molded Base)
                        for(let x=-8; x<=8; x++) for(let z=-7; z<=2; z++) v(piece, x, 18, z, vaderDark);
                        // Helmet Main Cube
                        for(let y=19; y<24; y++) {
                            for(let x=-6; x<=6; x++) for(let z=-6; z<=4; z++) v(piece, x, y, z, vaderDark);
                        }
                        // Top molded cap
                        for(let x=-4; x<=4; x++) for(let z=-4; z<=2; z++) v(piece, x, 24, z, vaderDark);
                        // Face mask snout
                        for(let y=18; y<21; y++) for(let x=-2; x<=2; x++) v(piece, x, y, 5, vaderDark);
                        for(let y=7; y<30; y++) v(piece, 9, y, 4, saber); 
                        break;

                    case 'p': // TROOPER (MOLDED CUBED)
                        for(let y=0; y<14; y++) for(let x=-4; x<=4; x++) for(let z=-4; z<=4; z++) v(piece, x, y, z, white); 
                        // Neck Rim
                        for(let x=-5; x<=5; x++) for(let z=-5; z<=5; z++) v(piece, x, 14, z, white);
                        // Main Helmet Block
                        for(let y=15; y<20; y++) {
                            for(let x=-5; x<=5; x++) for(let z=-5; z<=5; z++) v(piece, x, y, z, white);
                        }
                        // Snout Protrusion
                        for(let x=-1.5; x<=1.5; x++) for(let y=14; y<17; y++) v(piece, x, y, 6, white);
                        // Visor
                        for(let x=-5; x<=5; x++) v(piece, x, 17, 5.2, 0x000000); 
                        break;
                    default: for(let y=0; y<20; y++) v(piece, 0, y, 0, 0x333333); break;
                }
            } else {
                switch(type) {
                    case 'n': // X-WING (REAR WINGS, LONG NOSE)
                        // Extra Long Fuselage
                        for(let x=-2; x<=2; x++) for(let y=5; y<=7; y++) for(let z=-25; z<=12; z++) v(piece, x, y, z*dir, white); 
                        
                        const wingZ = -18; 
                        // Engine Cylinders
                        [[-5, 7], [5, 7], [-5, 5], [5, 5]].forEach(pos => {
                            for(let x=pos[0]-2; x<=pos[0]+2; x++) 
                                for(let y=pos[1]-2; y<=pos[1]+2; y++)
                                    for(let z=wingZ-4; z<=wingZ+2; z++) v(piece, x, y, z*dir, 0x444444);
                        });

                        // Flat X-S-Foils at Rear
                        for(let i=1; i<18; i++) {
                            let rise = i * 0.4; let spread = 2 + i;
                            for(let zo=0; zo<5; zo++) {
                                v(piece, spread, 6.5+rise, (wingZ-zo)*dir, white); 
                                v(piece, -spread, 6.5+rise, (wingZ-zo)*dir, white);
                                v(piece, spread, 5.5-rise, (wingZ-zo)*dir, white);
                                v(piece, -spread, 5.5-rise, (wingZ-zo)*dir, white);
                            }
                        }
                        break;
                    case 'k': // JEDI
                        for(let y=0; y<20; y++) for(let x=-5; x<=5; x++) for(let z=-5; z<=5; z++) v(piece, x, y, z, 0x3d2b1f);
                        for(let y=15; y<35; y++) v(piece, 8, y, 0, saber);
                        break;
                    case 'p': // REBEL
                        for(let y=0; y<14; y++) for(let x=-4; x<=4; x++) for(let z=-4; z<=4; z++) v(piece, x, y, z, 0x445544);
                        for(let y=14; y<20; y++) for(let x=-4; x<=4; x++) for(let z=-4; z<=4; z++) v(piece, x, y, z, 0xddccbb);
                        break;
                    default: for(let y=0; y<20; y++) v(piece, 0, y, 0, white); break;
                }
            }
            piece.position.set(gridX - 3.5, 0.1, gridZ - 3.5);
            piecesGroup.add(piece);
        }

        function createStars() {
            const coords = [];
            for(let i=0; i<800; i++) coords.push((Math.random()-0.5)*180, (Math.random()-0.5)*180, (Math.random()-0.5)*180);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1})));
        }

        function createBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const sq = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.1, 0.98), new THREE.MeshPhongMaterial({ color: isBlack ? 0x050505 : 0x101010 }));
                    sq.position.set(x - 3.5, -0.05, z - 3.5);
                    sq.userData = { x, z };
                    scene.add(sq);
                    boardSquares.push(sq);
                }
            }
        }

        function renderPieces() {
            while(piecesGroup.children.length > 0) piecesGroup.remove(piecesGroup.children[0]);
            const state = game.board();
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(state[r][c]) buildVoxelPiece(state[r][c].type, state[r][c].color, c, r);
        }

        function onPointerDown(event) {
            if (event.target.tagName === 'BUTTON') return;
            const ray = new THREE.Raycaster();
            const m = new THREE.Vector2((event.clientX/window.innerWidth)*2-1, -(event.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].object.userData.x !== undefined) {
                const coord = String.fromCharCode(97 + hits[0].object.userData.x) + (8 - hits[0].object.userData.z);
                if(!selectedSquare) {
                    const p = game.get(coord);
                    if(p && p.color === game.turn()) {
                        selectedSquare = coord;
                        boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                        hits[0].object.material.emissive.setHex(0x004488);
                    }
                } else {
                    const move = game.move({ from: selectedSquare, to: coord, promotion: 'q' });
                    selectedSquare = null;
                    boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                    if(move) { renderPieces(); updateUI(); if(isAiMode && !game.game_over()) setTimeout(() => { const moves = game.moves(); if(moves.length > 0) { game.move(moves[Math.floor(Math.random()*moves.length)]); renderPieces(); updateUI(); } }, 500); }
                }
            }
        }

        function updateUI() { let t = game.turn() === 'w' ? "REBEL" : "EMPIRE"; document.getElementById('status-text').innerText = game.game_over() ? "WAR OVER" : t + " TURN"; }
        function setMode(m) { isAiMode = (m === 'ai'); resetGame(); }
        function resetGame() { game.reset(); renderPieces(); updateUI(); selectedSquare = null; }
        function animate() { requestAnimationFrame(animate); controls.update(); piecesGroup.children.forEach((p, i) => { p.position.y = 0.1 + Math.sin(Date.now()*0.002+i)*0.03; }); renderer.render(scene, camera); }
        window.onload = init;
    </script>
</body>
</html>
