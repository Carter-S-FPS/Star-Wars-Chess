<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxel Jedi vs Empire</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #ui {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #00eeff; pointer-events: none; z-index: 10;
        }
        .controls {
            position: absolute; bottom: 20px; width: 100%; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            padding: 0 15px; box-sizing: border-box; z-index: 10;
        }
        button {
            padding: 18px 5px; background: rgba(0, 20, 40, 0.9);
            color: #00eeff; border: 2px solid #00eeff; font-weight: bold;
            font-size: 13px; border-radius: 4px; pointer-events: auto;
            text-transform: uppercase;
        }
        button:active { background: #00eeff; color: #000; }
        #status-text { font-size: 1.4em; text-shadow: 0 0 10px #00eeff; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status-text">SYSTEM INITIALIZED</div>
        <div id="sub-text">TAP TO SELECT UNIT</div>
    </div>

    <div class="controls">
        <button onclick="setMode('pvp')">2 PLAYER</button>
        <button onclick="setMode('ai')">VS EMPIRE AI</button>
        <button onclick="resetGame()" style="grid-column: span 2; opacity: 0.7;">RESTART MISSION</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let scene, camera, renderer, controls, game;
        let selectedSquare = null;
        let isAiMode = false;
        let piecesGroup = new THREE.Group();
        let boardSquares = [];

        function init() {
            game = new Chess();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 14, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const pLight = new THREE.PointLight(0x00eeff, 1, 50);
            pLight.position.set(0, 10, 5);
            scene.add(pLight);

            createStars();
            createBoard();
            renderPieces();
            scene.add(piecesGroup);

            window.addEventListener('pointerdown', onPointerDown);
            animate();
        }

        function createStars() {
            const coords = [];
            for(let i=0; i<1000; i++) coords.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(coords, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1})));
        }

        function createBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const square = new THREE.Mesh(
                        new THREE.BoxGeometry(0.98, 0.4, 0.98),
                        new THREE.MeshPhongMaterial({ color: isBlack ? 0x050505 : 0x1a1a1a })
                    );
                    square.position.set(x - 3.5, -0.2, z - 3.5);
                    square.userData = { x, z };
                    scene.add(square);
                    boardSquares.push(square);
                }
            }
        }

        function createVoxelBlock(group, x, y, z, color) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.18, 0.18),
                new THREE.MeshLambertMaterial({ color: color })
            );
            mesh.position.set(x * 0.18, y * 0.18, z * 0.18);
            group.add(mesh);
        }

        function buildVoxelPiece(type, side, x, z) {
            const group = new THREE.Group();
            const isEmpire = (side === 'b');
            const baseCol = isEmpire ? 0x222222 : 0xdddddd; // Dark vs Light
            const accentCol = isEmpire ? 0xff0000 : 0x00ff88; // Red Sabers/Eyes vs Green Sabers/Force

            if (isEmpire) {
                // IMPERIAL STYLE: Sharp, Spiky, Aggressive
                if (type === 'p') { // Stormtrooper
                    for(let y=0; y<3; y++) createVoxelBlock(group, 0, y, 0, baseCol);
                    createVoxelBlock(group, 0, 3, 0, 0xffffff); // White Helmet
                } else if (type === 'k') { // Vader
                    for(let y=0; y<5; y++) {
                        createVoxelBlock(group, 0, y, 0, 0x000000);
                        if(y < 4) createVoxelBlock(group, 0.8, y, 0, 0x000000); // Cape
                    }
                    createVoxelBlock(group, 1, 2, 1, accentCol); // Red Lightsaber
                } else if (type === 'n') { // TIE Fighter
                    for(let y=1; y<4; y++) {
                        createVoxelBlock(group, 1.5, y, 0, baseCol);
                        createVoxelBlock(group, -1.5, y, 0, baseCol);
                    }
                    createVoxelBlock(group, 0, 2, 0, 0x111111);
                } else { // Generic Imperial (Tall Sharp Towers)
                    for(let y=0; y<6; y++) createVoxelBlock(group, 0, y, 0, baseCol);
                }
            } else {
                // JEDI/REBEL STYLE: Tiered, Balanced, Organic
                if (type === 'p') { // Rebel Soldier
                    createVoxelBlock(group, 0, 0, 0, 0x554433); // Tan boots
                    createVoxelBlock(group, 0, 1, 0, 0x335533); // Green vest
                    createVoxelBlock(group, 0, 2, 0, 0xddccbb); // Helmet
                } else if (type === 'k') { // Jedi Master
                    for(let y=0; y<5; y++) createVoxelBlock(group, 0, y, 0, 0x4a3728); // Brown Robes
                    for(let i=1; i<4; i++) createVoxelBlock(group, 1, i+1, 0, accentCol); // Green Lightsaber
                } else if (type === 'n') { // X-Wing
                    for(let z=-2; z<2; z++) createVoxelBlock(group, 0, 2, z, baseCol);
                    createVoxelBlock(group, 1, 1.5, -1.5, baseCol);
                    createVoxelBlock(group, -1, 1.5, -1.5, baseCol);
                } else { // Jedi Temple / Guardian
                    for(let y=0; y<4; y++) {
                        for(let i=-1; i<=1; i++) createVoxelBlock(group, i, y, 0, baseCol);
                    }
                }
            }

            group.position.set(x - 3.5, 0.2, z - 3.5);
            piecesGroup.add(group);
        }

        function renderPieces() {
            while(piecesGroup.children.length > 0) piecesGroup.remove(piecesGroup.children[0]);
            const boardState = game.board();
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const p = boardState[r][c];
                    if(p) buildVoxelPiece(p.type, p.color, c, r);
                }
            }
        }

        function onPointerDown(event) {
            if (event.target.tagName === 'BUTTON') return;
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if(obj.userData.x !== undefined) {
                    const coord = String.fromCharCode(97 + obj.userData.x) + (8 - obj.userData.z);
                    handleInput(coord, obj);
                }
            }
        }

        function handleInput(coord, mesh) {
            if(!selectedSquare) {
                const piece = game.get(coord);
                if(piece && piece.color === game.turn()) {
                    selectedSquare = coord;
                    boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                    mesh.material.emissive.setHex(0x004488); 
                    document.getElementById('status-text').innerText = "UNIT: " + coord.toUpperCase();
                }
            } else {
                const move = game.move({ from: selectedSquare, to: coord, promotion: 'q' });
                selectedSquare = null;
                boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                if(move) {
                    renderPieces();
                    updateStatus();
                    if(isAiMode && !game.game_over()) setTimeout(() => {
                        const moves = game.moves();
                        game.move(moves[Math.floor(Math.random() * moves.length)]);
                        renderPieces();
                        updateStatus();
                    }, 500);
                } else {
                    document.getElementById('status-text').innerText = "ABORT: INVALID";
                }
            }
        }

        function updateStatus() {
            let status = game.turn() === 'w' ? "JEDI TURN" : "EMPIRE TURN";
            if(game.in_checkmate()) status = "SECTOR SECURED";
            document.getElementById('status-text').innerText = status;
        }

        function setMode(m) { isAiMode = (m === 'ai'); resetGame(); }
        function resetGame() { game.reset(); renderPieces(); updateStatus(); selectedSquare = null; }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            piecesGroup.children.forEach((p, i) => { p.position.y = 0.2 + Math.sin(Date.now() * 0.002 + i) * 0.04; });
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
