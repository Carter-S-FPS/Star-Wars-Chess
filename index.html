<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars Chess | Stable Build</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            background-color: #05070a;
            color: #4ef0ff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .highlight-move {
            box-shadow: inset 0 0 15px 5px rgba(78, 240, 255, 0.7);
        }
        .board-wrapper {
            border: 4px solid #4ef0ff;
            background: #000;
            padding: 5px;
        }
        #myBoard { width: 500px; }
        .white-1e1d7 { background-color: #1a2a3a !important; }
        .black-3c85d { background-color: #0a0a0a !important; }
        .dashboard {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #4ef0ff;
            text-align: center;
            width: 480px;
        }
        button {
            background: #ff4e4e;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>HOLOGRAPHIC CHESS</h1>

    <div class="board-wrapper">
        <div id="myBoard"></div>
    </div>

    <div class="dashboard">
        <div id="status">COMM LINK ACTIVE</div>
        <button onclick="resetGame()">RESET SYSTEM</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();

        // EMBEDDED IMAGES (Base64) - These will never fail to load
        const REBEL_SVG = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRlZjBmZiI+PHBhdGggZD0iTTEyIDJMMiA3djExbDEwIDUgMTAtNXYtMTFsLTEwLTV6bTAgMThsLTggLTR2LThsOC00IDggNHY4bDgtNHoiLz48L3N2Zz4=";
        const EMPIRE_SVG = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmNGU0ZSI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiLz48cGF0aCBkPSJNMTIgMmwtMiA0aDRsLTIgNHY0bC00LTJoOHoiIGZpbGw9IiMwMDAiLz48L3N2Zz4=";

        function pieceTheme(piece) {
            // White pieces = Rebels, Black pieces = Empire
            return (piece.charAt(0) === 'w') ? REBEL_SVG : EMPIRE_SVG;
        }

        function removeHighlights() {
            $('#myBoard .square-55d63').removeClass('highlight-move');
        }

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;

            var moves = game.moves({ square: source, verbose: true });
            if (moves.length === 0) return;

            $('#myBoard .square-' + source).addClass('highlight-move');
            for (var i = 0; i < moves.length; i++) {
                $('#myBoard .square-' + moves[i].to).addClass('highlight-move');
            }
        }

        function onDrop (source, target) {
            removeHighlights();
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'EMPIRE' : 'REBELS';
            $('#status').text(turn + " TO STRIKE");
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
            removeHighlights();
        }

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        updateStatus();
    </script>
</body>
</html>
