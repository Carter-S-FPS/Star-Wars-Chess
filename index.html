<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars: Iconic Voxel Chess</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #00eeff; pointer-events: none; z-index: 10; }
        .hud { border: 1px solid #00eeff; background: rgba(0,20,40,0.9); display: inline-block; padding: 10px 30px; box-shadow: 0 0 20px #00eeff; }
        .controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        button { padding: 10px 20px; background: #000; color: #00eeff; border: 1px solid #00eeff; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00eeff; color: #000; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="hud">
            <div id="status" style="font-size: 20px; letter-spacing: 3px;">CHARACTER DETAIL ENHANCED</div>
            <div id="turn" style="font-size: 10px; opacity: 0.8; margin-top: 5px;">REBEL HEROES VS GALACTIC EMPIRE</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="setMode('pvp')">LOCAL OPS</button>
        <button onclick="setMode('ai')">IMPERIAL AI</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        let scene, camera, renderer, controls, game;
        let selectedSquare = null;
        let isAiMode = false;
        let piecesGroup = new THREE.Group();
        let boardSquares = [];
        const S = 0.01; 

        function init() {
            game = new Chess();
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 15);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.8)); 
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 15, 10);
            scene.add(light);
            createStars();
            createBoard();
            scene.add(piecesGroup);
            syncPieces();
            window.addEventListener('pointerdown', onPointerDown);
            animate();
        }

        function createVoxelMesh(coords, color, emissive = 0x000000) {
            if (!coords.length) return new THREE.Group();
            const geo = new THREE.BoxBufferGeometry(S, S, S);
            const mat = new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: 2.5 });
            const mesh = new THREE.InstancedMesh(geo, mat, coords.length);
            const dummy = new THREE.Object3D();
            coords.forEach((c, i) => {
                dummy.position.set(c[0]*S, c[1]*S, c[2]*S);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            });
            return mesh;
        }

        function buildVoxelPiece(type, side, gridX) {
            const group = new THREE.Group();
            const isBlack = (side === 'b');
            let data = { body: [], head: [], saber: [], special: [], legs: [], blaster: [], hair: [] };
            const fill = (arr, x1, y1, z1, x2, y2, z2) => {
                for(let x=x1; x<=x2; x++) for(let y=y1; y<=y2; y++) for(let z=z1; z<=z2; z++) arr.push([x,y,z]);
            };

            if (isBlack) {
                switch(type) {
                    case 'k': // VADER
                        fill(data.body, -8, 0, -6, 8, 25, 4); fill(data.head, -7, 25, -7, 7, 36, 3); 
                        fill(data.saber, 10, 5, 2, 11, 48, 3); 
                        group.add(createVoxelMesh(data.body, 0x1a1a1a), createVoxelMesh(data.head, 0x000000), createVoxelMesh(data.saber, 0xff0000, 0x880000));
                        break;
                    case 'q': // PALPATINE
                        fill(data.body, -7, 0, -7, 7, 28, 7); fill(data.head, -5, 28, -5, 5, 36, 4); 
                        fill(data.special, -2, 30, 4, 2, 33, 5); // Face
                        group.add(createVoxelMesh(data.body, 0x111111), createVoxelMesh(data.head, 0x0a0a0a), createVoxelMesh(data.special, 0xded1b1));
                        break;
                    case 'r': // STAR DESTROYER
                        for(let z=-30; z<=15; z++) { let w = Math.floor((15-z)/3); fill(data.body, -w, 0, z, w, 6, z); }
                        fill(data.head, -4, 6, -15, 4, 14, -8);
                        group.add(createVoxelMesh(data.body, 0xbbbbbb), createVoxelMesh(data.head, 0x999999));
                        break;
                    case 'b': // ROYAL GUARDS
                        fill(data.body, -5, 0, -5, 5, 32, 5); fill(data.head, -4, 32, -4, 4, 38, 4);
                        fill(data.special, 6, 0, 0, 7, 45, 1); 
                        group.add(createVoxelMesh(data.body, 0xaa0000), createVoxelMesh(data.head, 0x880000), createVoxelMesh(data.special, 0x333333));
                        break;
                    case 'n': // AT-AT
                        fill(data.body, -8, 15, -12, 8, 25, 12);
                        [[-6,-10],[6,-10],[-6,8],[6,8]].forEach(pos => fill(data.legs, pos[0]-1, 0, pos[1]-1, pos[0]+1, 15, pos[1]+1));
                        const headNode = new THREE.Group(); headNode.name = "atHead";
                        let hV = []; fill(hV, -5, 0, 0, 5, 6, 8);
                        let hM = createVoxelMesh(hV, 0x888888); hM.position.set(0, 18*S, 12*S);
                        headNode.add(hM); group.add(headNode);
                        group.add(createVoxelMesh(data.body, 0xaaaaaa), createVoxelMesh(data.legs, 0x777777));
                        break;
                    case 'p': // B1 DROID
                        fill(data.body, -2, 0, -2, 2, 22, 2); fill(data.head, -2, 22, -1, 2, 28, 6);
                        fill(data.blaster, 3, 10, 0, 4, 12, 8); 
                        group.add(createVoxelMesh(data.body, 0xe2c4ac), createVoxelMesh(data.head, 0xd2b49c), createVoxelMesh(data.blaster, 0x222222));
                        break;
                }
            } else {
                group.rotation.y = Math.PI;
                switch(type) {
                    case 'q': // YODA
                        fill(data.body, -4, 0, -4, 4, 12, 4); fill(data.head, -5, 12, -4, 5, 18, 4); 
                        fill(data.saber, -6, 5, 4, -7, 25, 5); 
                        group.add(createVoxelMesh(data.body, 0xded1b1), createVoxelMesh(data.head, 0x4f7942), createVoxelMesh(data.saber, 0x00ff00, 0x00aa00));
                        break;
                    case 'n': // X-WING
                        fill(data.body, -2, 4, -15, 2, 8, 10);
                        for(let i=3; i<=14; i++) {
                            let zB = -10 + (i-3)*0.4;
                            fill(data.special, i, 6 + (i-3)*0.8, zB, i+2, 7 + (i-3)*0.8, zB+10); 
                            fill(data.special, -i-2, 6 + (i-3)*0.8, zB, -i, 7 + (i-3)*0.8, zB+10); 
                            fill(data.special, i, 6 - (i-3)*0.8, zB, i+2, 7 - (i-3)*0.8, zB+10); 
                            fill(data.special, -i-2, 6 - (i-3)*0.8, zB, -i, 7 - (i-3)*0.8, zB+10); 
                        }
                        group.add(createVoxelMesh(data.body, 0xeeeeee), createVoxelMesh(data.special, 0xdddddd));
                        break;
                    case 'r': // ROOKS
                        if (gridX === 0) { // C-3PO
                            fill(data.body, -4, 0, -3, 4, 32, 3);
                            group.add(createVoxelMesh(data.body, 0xffcc00));
                        } else { // R2-D2
                            fill(data.body, -6, 0, -6, 6, 15, 6); fill(data.head, -5, 15, -5, 5, 20, 5);
                            group.add(createVoxelMesh(data.body, 0xeeeeee), createVoxelMesh(data.head, 0x0066ff));
                        }
                        break;
                    case 'p': // CLONE
                        fill(data.body, -6, 0, -5, 6, 22, 5); fill(data.head, -5, 22, -5, 5, 30, 4);
                        fill(data.special, -4, 26, 4, 4, 27, 5);
                        group.add(createVoxelMesh(data.body, 0xffffff), createVoxelMesh(data.head, 0xffffff), createVoxelMesh(data.special, 0x00eeff, 0x0088ff));
                        break;
                    case 'k': // LUKE (WITH HAIR)
                        fill(data.body, -6, 0, -4, 6, 25, 4); fill(data.head, -5, 25, -5, 5, 30, 5);
                        fill(data.hair, -6, 30, -5, 6, 34, 6); // Sandy Blonde Hair
                        fill(data.saber, -10, 5, 3, -11, 45, 4);
                        group.add(createVoxelMesh(data.body, 0x333333), createVoxelMesh(data.head, 0xffdbac), createVoxelMesh(data.hair, 0xd4b483), createVoxelMesh(data.saber, 0x00ff00, 0x00aa00));
                        break;
                    case 'b': // LEIA / CHEWIE
                        if (gridX === 5) { // LEIA (WITH HAIR BUNS)
                            fill(data.body, -6, 0, -6, 6, 25, 6); fill(data.head, -4, 25, -4, 4, 30, 4);
                            fill(data.hair, -4, 30, -4, 4, 33, 4); // Top hair
                            fill(data.hair, 4, 27, -1, 7, 31, 2); // Bun R
                            fill(data.hair, -7, 27, -1, -4, 31, 2); // Bun L
                            group.add(createVoxelMesh(data.body, 0xffffff), createVoxelMesh(data.head, 0xffdbac), createVoxelMesh(data.hair, 0x4b3621));
                        } else { // CHEWIE
                            fill(data.body, -7, 0, -6, 7, 48, 6); fill(data.special, -8, 15, -7, 8, 18, 7);
                            group.add(createVoxelMesh(data.body, 0x5b4631), createVoxelMesh(data.special, 0xdddddd));
                        }
                        break;
                }
            }
            return group;
        }

        function syncPieces() {
            const board = game.board();
            const currentIds = [];
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const p = board[r][c];
                    if(p) {
                        const id = `${p.type}-${p.color}-${c}-${r}`;
                        currentIds.push(id);
                        let m = piecesGroup.children.find(ch => ch.userData.id === id);
                        if(!m) {
                            m = buildVoxelPiece(p.type, p.color, c);
                            m.userData.id = id; m.position.set(c-3.5, 0, r-3.5);
                            piecesGroup.add(m); m.scale.set(0,0,0);
                            new TWEEN.Tween(m.scale).to({x:1, y:1, z:1}, 500).easing(TWEEN.Easing.Back.Out).start();
                        } else {
                            new TWEEN.Tween(m.position).to({x: c-3.5, z: r-3.5}, 600).easing(TWEEN.Easing.Quadratic.InOut).start();
                        }
                    }
                }
            }
            piecesGroup.children = piecesGroup.children.filter(ch => {
                if(!currentIds.includes(ch.userData.id)) {
                    new TWEEN.Tween(ch.scale).to({x:0, y:0, z:0}, 300).onComplete(() => piecesGroup.remove(ch)).start();
                    return false;
                }
                return true;
            });
        }

        function createStars() {
            const geo = new THREE.BufferGeometry(); const pts = [];
            for(let i=0; i<5000; i++) pts.push((Math.random()-0.5)*500, (Math.random()-0.5)*500, (Math.random()-0.5)*500);
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15})));
        }

        function createBoard() {
            for (let x=0; x<8; x++) for (let z=0; z<8; z++) {
                const color = (x+z)%2 ? 0x001a33 : 0x003366;
                const sq = new THREE.Mesh(new THREE.BoxBufferGeometry(0.98, 0.15, 0.98), 
                    new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.9 }));
                sq.position.set(x-3.5, -0.075, z-3.5); sq.userData = { x, z };
                scene.add(sq); boardSquares.push(sq);
            }
        }

        function onPointerDown(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            const m = new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
            const ray = new THREE.Raycaster(); ray.setFromCamera(m, camera);
            const hits = ray.intersectObjects(boardSquares);
            if(hits.length > 0) {
                const bh = hits[0].object; const coord = String.fromCharCode(97+bh.userData.x)+(8-bh.userData.z);
                if(!selectedSquare) {
                    const p = game.get(coord);
                    if(p && p.color === game.turn()) {
                        selectedSquare = coord; bh.material.emissive.setHex(0x00eeff);
                    }
                } else {
                    if(game.move({ from: selectedSquare, to: coord, promotion: 'q' })) {
                        syncPieces();
                        document.getElementById('turn').innerText = game.turn() === 'w' ? "REBEL TURN" : "EMPIRE TURN";
                        if(isAiMode) setTimeout(() => {
                            const moves = game.moves();
                            if(moves.length) { game.move(moves[Math.floor(Math.random()*moves.length)]); syncPieces(); }
                        }, 600);
                    }
                    selectedSquare = null; boardSquares.forEach(s => s.material.emissive.setHex(0x000000));
                }
            }
        }

        function setMode(m) { isAiMode = (m === 'ai'); game.reset(); syncPieces(); }

        function animate(t) { 
            requestAnimationFrame(animate); TWEEN.update(t); controls.update(); 
            const time = Date.now()*0.002;
            piecesGroup.children.forEach((p) => {
                p.position.y = 0.05 + Math.sin(time + p.position.x)*0.01;
                const head = p.getObjectByName("atHead");
                if(head) head.rotation.y = Math.sin(time * 0.5) * 0.4;
            });
            renderer.render(scene, camera); 
        }
        window.onload = init;
    </script>
</body>
</html>
