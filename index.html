<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Star Wars Chess</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #fff; text-shadow: 2px 2px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>BLOCK-WORLD TACTICAL</h1>
        <div id="status">LOADING VOXELS...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        const pieces = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Minecraft Sky Blue

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 12, 10);

            renderer = new THREE.WebGLRenderer({ antialias: false }); // Pixelated feel
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.BasicShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            
            // Bright Sunlight
            const sun = new THREE.DirectionalLight(0xffffff, 3);
            sun.position.set(5, 10, 7.5);
            sun.castShadow = true;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            createVoxelBoard();
            setupPieces();
        }

        // Helper to build a piece from "blocks"
        function createVoxelPiece(type, color, gridX, gridZ) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ 
                color: color === 'white' ? 0xeeeeee : 0x333333 
            });
            const detailMat = new THREE.MeshLambertMaterial({ 
                color: color === 'white' ? 0xcc0000 : 0xff0000 
            });

            const addBlock = (x, y, z, m = mat) => {
                const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const cube = new THREE.Mesh(geo, m);
                cube.position.set(x * 0.2, y * 0.2, z * 0.2);
                cube.castShadow = true;
                group.add(cube);
            };

            // Simple Voxel Logic per Rank
            if (type === 'P') { // Stormtrooper/Pawn
                for(let y=0; y<3; y++) addBlock(0,y,0);
                addBlock(0,3,0, detailMat); // Helmet
            } else if (type === 'R') { // AT-AT / Rook
                for(let x=-1; x<=1; x++) for(let z=-1; z<=1; z++) addBlock(x,0,z);
                for(let y=1; y<4; y++) addBlock(0,y,0);
            } else if (type === 'N') { // Star Destroyer / Knight
                for(let z=-2; z<=2; z++) for(let x=-z; x<=z; x++) addBlock(x/2, 1, z);
            } else if (type === 'K') { // Vader / King
                for(let y=0; y<5; y++) addBlock(0,y,0);
                addBlock(0,4,0, new THREE.MeshLambertMaterial({color: 0x000000}));
                addBlock(1,2,0, detailMat); // Saber
            } else { // Generic "Blocky"
                for(let y=0; y<4; y++) addBlock(0,y,0);
                for(let x=-1; x<=1; x++) addBlock(x,3,0);
            }

            group.position.set(gridX - 3.5, 0.2, gridZ - 3.5);
            scene.add(group);
            pieces.push(group);
        }

        function createVoxelBoard() {
            for (let x = 0; x < 8; x++) {
                for (let z = 0; z < 8; z++) {
                    const isBlack = (x + z) % 2 !== 0;
                    const geo = new THREE.BoxGeometry(1, 0.4, 1);
                    const mat = new THREE.MeshLambertMaterial({
                        color: isBlack ? 0x224422 : 0x336633 // Grass/Dirt colors
                    });
                    const block = new THREE.Mesh(geo, mat);
                    block.position.set(x - 3.5, -0.2, z - 3.5);
                    block.receiveShadow = true;
                    scene.add(block);
                }
            }
        }

        function setupPieces() {
            const layout = ['R','N','B','Q','K','B','N','R'];
            for(let i=0; i<8; i++) {
                createVoxelPiece('P', 'black', i, 1);
                createVoxelPiece(layout[i], 'black', i, 0);
                createVoxelPiece('P', 'white', i, 6);
                createVoxelPiece(layout[i], 'white', i, 7);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            pieces.forEach((p, i) => {
                p.rotation.y = Math.sin(time + i) * 0.2;
            });
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
