<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Chess | Tactical HUD</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root {
            --rebel-blue: #4ef0ff;
            --empire-red: #ff4e4e;
            --highlight-color: rgba(78, 240, 255, 0.5); /* Rebel Blue Glow */
        }

        body {
            background-color: #05070a;
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 20px);
            background-size: 100px 100px;
            color: var(--rebel-blue);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* Tactical Highlight - The "Where you can go" glow */
        .highlight-move {
            box-shadow: inset 0 0 15px 5px var(--highlight-color);
        }

        .board-wrapper {
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(78, 240, 255, 0.3);
            padding: 5px;
            background: #111;
        }

        #myBoard { width: 550px; max-width: 90vw; }

        .white-1e1d7 { background-color: #2c3e50 !important; }
        .black-3c85d { background-color: #1a1a1a !important; }

        .dashboard {
            margin-top: 20px;
            width: 550px;
            max-width: 90vw;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--rebel-blue);
            padding: 15px;
            text-align: center;
        }

        #status { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }

        button {
            background: transparent;
            color: var(--empire-red);
            border: 1px solid var(--empire-red);
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Tactical HUD Chess</h1>

    <div class="board-wrapper">
        <div id="myBoard"></div>
    </div>

    <div class="dashboard">
        <div id="status">Awaiting Input...</div>
        <button onclick="resetGame()">Reset Mission</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $board = $('#myBoard');

        const pieces = {
            'wK': 'https://img.icons8.com/color/150/luke-skywalker.png',
            'wQ': 'https://img.icons8.com/color/150/princess-leia.png',
            'wB': 'https://img.icons8.com/color/150/yoda.png',
            'wN': 'https://img.icons8.com/color/150/millennium-falcon.png',
            'wR': 'https://img.icons8.com/color/150/r2-d2.png',
            'wP': 'https://img.icons8.com/color/150/rebel-alliance.png',
            'bK': 'https://img.icons8.com/color/150/darth-vader.png',
            'bQ': 'https://img.icons8.com/color/150/emperor-palpatine.png',
            'bB': 'https://img.icons8.com/color/150/bobafett.png',
            'bN': 'https://img.icons8.com/color/150/tie-fighter.png',
            'bR': 'https://img.icons8.com/color/150/death-star.png',
            'bP': 'https://img.icons8.com/color/150/stormtrooper.png'
        };

        // Remove highlights from all squares
        function removeGreySquares () {
            $('#myBoard .square-55d63').removeClass('highlight-move');
        }

        // Add highlights to specific squares
        function greySquare (square) {
            $('#myBoard .square-' + square).addClass('highlight-move');
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }

            // Get list of legal moves for this piece
            var moves = game.moves({
                square: source,
                verbose: true
            });

            if (moves.length === 0) return;

            // Highlight the source square and potential targets
            greySquare(source);
            for (var i = 0; i < moves.length; i++) {
                greySquare(moves[i].to);
            }
        }

        function onDrop (source, target) {
            removeGreySquares();
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'THE EMPIRE' : 'THE REBELS';
            var status = turn + ' TURN';
            if (game.in_checkmate()) status = turn + ' HAS BEEN DEFEATED';
            $('#status').text(status);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
            removeGreySquares();
        }

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            pieceTheme: (p) => pieces[p],
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        updateStatus();
    </script>
</body>
</html>
